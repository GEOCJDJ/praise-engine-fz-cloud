<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Praise Engine FZ® | I.E.C. Fortaleza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1E3A8A;
            --primary-light: #3B82F6;
            --primary-rgb: 30, 58, 138;
            --bg-app: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --radius-lg: 1.5rem;
            --radius-sm: 1rem;
        }
        body.dark {
            --primary: #3B82F6;
            --primary-light: #60A5FA;
            --primary-rgb: 59, 130, 246;
            --bg-app: #0F172A;
            --surface: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); transition: 0.2s; }
        .app-header { background: var(--surface); padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .app-title { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
        .app-title i { font-size: 1.5rem; color: var(--primary); background: none; }
        .app-title small { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); }
        .nav-icons { display: flex; overflow-x: auto; gap: 0.75rem; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; min-width: 65px; padding: 0.5rem; cursor: pointer; color: var(--text-muted); font-size: 0.7rem; font-weight: 600; border-radius: var(--radius-sm); }
        .nav-item i { font-size: 1.3rem; padding: 0.5rem; border-radius: 1rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--primary); background: rgba(var(--primary-rgb), 0.1); }
        .nav-item.active i { background: var(--primary); color: white; }
        .dark-mode-toggle { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; background: var(--bg-app); padding: 0.5rem 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border); font-weight: 600; font-size: 0.8rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .search-container { position: relative; margin-bottom: 1rem; }
        .search-box { width: 100%; background: var(--surface); border: 2px solid var(--border); padding: 0.9rem 1rem 0.9rem 3rem; border-radius: var(--radius-lg); font-size: 1rem; }
        .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .view-controls { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .btn-view { 
            border: 2px solid var(--border); 
            background: var(--surface); 
            padding: 0.6rem 1.2rem; 
            border-radius: 2rem; 
            font-weight: 600; 
            cursor: pointer; 
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .btn-view.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 1.2rem; border: 1px solid var(--border); box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .card-category { font-size: 0.7rem; font-weight: 800; background: var(--primary); color: white; padding: 0.2rem 0.7rem; border-radius: 50px; display: inline-block; margin-bottom: 0.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 0.5rem 0; line-height: 1.3; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 2rem; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; border: 2px solid var(--border); color: var(--text-muted); }
        .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { background: var(--surface); width: 100%; max-width: 600px; max-height: 85vh; border-radius: 2rem; padding: 1.5rem; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-control { width: 100%; padding: 0.8rem; border-radius: var(--radius-lg); border: 2px solid var(--border); background: var(--bg-app); }
        .metronome-led { width: 60px; height: 60px; border-radius: 50%; background: #ccc; margin: 0 auto 1rem; transition: background 0.05s; }
        .metronome-led.active { background: #f00; box-shadow: 0 0 20px red; }
        .teleprompter-screen { font-size: 2rem; text-align: center; padding: 2rem; background: #000; color: white; border-radius: 2rem; min-height: 300px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .tuner-container { text-align: center; }
        .tuner-note { font-size: 4rem; font-weight: 800; font-family: monospace; }
        .tuner-meter { width: 100%; height: 12px; background: #ddd; border-radius: 20px; margin: 1rem 0; overflow: hidden; }
        .tuner-needle { height: 100%; width: 0%; background: var(--primary); transition: width 0.05s linear; }
        .question-timer { font-size: 1.2rem; font-weight: bold; color: var(--primary); text-align: center; margin: 0.5rem 0; }
        .admin-tab { display: none; }
        @media (max-width: 640px) { .app-title { font-size: 0.9rem; } .nav-item { min-width: 55px; } }
        @media print {
            .app-header, .search-container, .view-controls, #actionHeader, .modal, .btn, .top10-panel { display: none; }
            body { margin: 0; padding: 0.3cm; }
            .print-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .print-card { border: 1px solid #000; border-radius: 8px; padding: 6px; break-inside: avoid; }
            .print-title { font-weight: bold; font-size: 10pt; text-align: center; border-bottom: 1px solid #aaa; margin-bottom: 3px; }
            .print-song { font-size: 8pt; margin: 2px 0; }
            .print-footer { font-size: 6pt; text-align: center; margin-top: 3px; }
        }
    </style>
</head>
<body>
<header class="app-header">
    <div class="app-title" id="easterEggTitle"><i class="fas fa-church"></i> Praise Engine FZ® <small>| I.E.C. Fortaleza by GEOCJDJ</small></div>
    <div class="nav-icons" id="navIcons">
        <div class="nav-item active" data-tab="songs"><i class="fas fa-music"></i><span>CANCIONERO</span></div>
        <div class="nav-item" data-tab="lists"><i class="fas fa-list-ul"></i><span>MIS LISTAS</span></div>
        <div class="nav-item" data-tab="resources"><i class="fas fa-tools"></i><span>RECURSOS</span></div>
        <div class="nav-item admin-tab" data-tab="admin" style="display:none;"><i class="fas fa-lock"></i><span>ADMIN</span></div>
        <div class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> <span>Modo Oscuro</span></div>
    </div>
</header>
<div class="container">
    <div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" class="search-box" id="globalSearch" placeholder="Buscar..." oninput="renderCurrentView()"></div>
    <div id="viewControls" class="view-controls"></div>
    <div id="actionHeader" style="margin-bottom: 1rem; text-align: right;"></div>
    <div id="mainContent"></div>
</div>
<div id="modal" class="modal"><div class="modal-content" id="modalBody"></div></div>

<script>
    // ==================== DATOS INICIALES ====================
    let songs = JSON.parse(localStorage.getItem('iec_songs')) || [
        { id: '1', title: 'Way Maker', category: 'Exaltación', key: 'G', bpm: 72, chordsUrl: '', chordsData: '', lyrics: 'Aquí estás, haciendo camino...\nEres el Dios de milagros...' },
        { id: '2', title: 'La Mesa', category: 'Júbilo', key: 'D', bpm: 88, chordsUrl: '', chordsData: '', lyrics: 'Preparamos la mesa...\nPara celebrar tu amor...' },
        { id: '3', title: 'Al Estar Aquí', category: 'Adoración', key: 'G', bpm: 66, chordsUrl: '', chordsData: '', lyrics: 'Al estar aquí, tu presencia llena el lugar...' }
    ];
    let lists = JSON.parse(localStorage.getItem('iec_lists')) || [];
    let team = JSON.parse(localStorage.getItem('praise_team')) || [];
    let attendance = JSON.parse(localStorage.getItem('praise_attendance')) || [];
    let shifts = JSON.parse(localStorage.getItem('praise_shifts')) || [];
    let modules = JSON.parse(localStorage.getItem('praise_modules')) || [
        { id: 'mod1', title: 'Teología de la Adoración', content: '<p>La adoración es respuesta a la revelación de Dios...</p>', questions: [{ text: '¿Qué es la adoración?', options: ['Un estilo musical', 'Respuesta a Dios', 'Un ritual'], correct: 1, time: 20 }] },
        { id: 'mod2', title: 'Liderazgo Servicial', content: '<p>El líder sirve como Jesús...</p>', questions: [{ text: '¿Cuál es la base del liderazgo cristiano?', options: ['Autoridad', 'Servicio', 'Carisma'], correct: 1, time: 20 }] },
        { id: 'mod3', title: 'Mentoreo', content: '<p>Multiplica discípulos...</p>', questions: [{ text: 'El mentoreo implica:', options: ['Enseñar teoría', 'Acompañar y multiplicar', 'Solo dar órdenes'], correct: 1, time: 20 }] }
    ];
    let currentTab = 'songs';
    let selectedListId = null;
    let viewMode = 'table';
    let listsViewMode = 'grid';
    let sortableInstance = null;
    let metronomeInterval = null;
    let adminVisible = false;
    const keys = ["C","Cm","C#","C#m","D","Dm","D#","D#m","E","Em","F","Fm","F#","F#m","G","Gm","G#","G#m","A","Am","A#","A#m","B","Bm"];

    function save() {
        localStorage.setItem('iec_songs', JSON.stringify(songs));
        localStorage.setItem('iec_lists', JSON.stringify(lists));
        localStorage.setItem('praise_team', JSON.stringify(team));
        localStorage.setItem('praise_attendance', JSON.stringify(attendance));
        localStorage.setItem('praise_shifts', JSON.stringify(shifts));
        localStorage.setItem('praise_modules', JSON.stringify(modules));
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // ==================== EASTER EGG ====================
    let pressTimer = null;
    const titleEl = document.getElementById('easterEggTitle');
    titleEl.addEventListener('mousedown', startTimer);
    titleEl.addEventListener('touchstart', startTimer);
    titleEl.addEventListener('mouseup', cancelTimer);
    titleEl.addEventListener('touchend', cancelTimer);
    function startTimer() { pressTimer = setTimeout(() => { adminVisible = true; document.querySelector('.admin-tab').style.display = 'flex'; alert('🔐 Modo Administración activado'); renderCurrentView(); }, 10000); }
    function cancelTimer() { if(pressTimer) clearTimeout(pressTimer); }

    function renderCurrentView() {
        if(currentTab === 'songs') renderSongs();
        else if(currentTab === 'lists') selectedListId ? renderListDetail() : renderLists();
        else if(currentTab === 'resources') renderResources();
        else if(currentTab === 'admin' && adminVisible) renderAdmin();
    }

    // ==================== CANCIONERO ====================
    function renderSongs() {
        const query = document.getElementById('globalSearch').value.toLowerCase();
        let filtered = songs.filter(s => s.title.toLowerCase().includes(query) || s.category.toLowerCase().includes(query));
        filtered.sort((a,b)=>a.title.localeCompare(b.title));
        document.getElementById('actionHeader').innerHTML = `<button class="btn btn-primary" onclick="openSongModal()"><i class="fas fa-plus"></i> Nueva Canción</button>`;
        document.getElementById('viewControls').innerHTML = `
            <button class="btn-view ${viewMode==='table'?'active':''}" id="songsTableView"><i class="fas fa-list"></i> Lista</button>
            <button class="btn-view ${viewMode==='grid'?'active':''}" id="songsGridView"><i class="fas fa-th-large"></i> Cuadrícula</button>`;
        document.getElementById('songsTableView')?.addEventListener('click',()=>{viewMode='table';renderSongs();});
        document.getElementById('songsGridView')?.addEventListener('click',()=>{viewMode='grid';renderSongs();});
        const container = document.getElementById('mainContent');
        if(viewMode === 'table') {
            container.innerHTML = `<div class="list-view-container"><table style="width:100%"><thead><tr><th>Título</th><th>Categoría</th><th>Tono</th><th>BPM</th><th>Acordes</th><th></th></tr></thead><tbody>
                ${filtered.map(s => `<tr>
                    <td><b>${escapeHtml(s.title)}</b></td>
                    <td><span class="card-category">${s.category}</span></td>
                    <td>${s.key}</td>
                    <td><button class="btn-icon" onclick="openMetronome('${s.id}'); event.stopPropagation();" title="Metrónomo"><i class="fas fa-drumstick-bite"></i> ${s.bpm || '--'}</button></td>
                    <td><button class="btn-icon" onclick="viewChords('${s.id}'); event.stopPropagation();" title="Acordes/PDF"><i class="fas fa-file-pdf"></i></button></td>
                    <td><button class="btn-icon" onclick="openSongModal('${s.id}'); event.stopPropagation();"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon" onclick="deleteSong('${s.id}'); event.stopPropagation();"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('')}
            </tbody></table></div>`;
        } else {
            container.innerHTML = `<div class="grid">${filtered.map(s => `
                <div class="card">
                    <span class="card-category">${s.category}</span>
                    <div class="card-title">${escapeHtml(s.title)}</div>
                    <div><i class="fas fa-music"></i> ${s.key} | 🥁 ${s.bpm && !isNaN(s.bpm) ? s.bpm : '--'} BPM</div>
                    <div style="margin-top:0.8rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
                        <button class="btn btn-ghost" onclick="openSongModal('${s.id}')">Editar</button>
                        <button class="btn btn-ghost" onclick="openMetronome('${s.id}')"><i class="fas fa-drumstick-bite"></i> Metrónomo</button>
                        <button class="btn btn-ghost" onclick="viewChords('${s.id}')"><i class="fas fa-file-pdf"></i> Acordes</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }
    }

    // ==================== LISTAS ====================
    function renderLists() {
        const query = document.getElementById('globalSearch').value.toLowerCase();
        let filtered = lists.filter(l => l.name.toLowerCase().includes(query));
        document.getElementById('actionHeader').innerHTML = `<button class="btn btn-primary" onclick="openCreateListModal()"><i class="fas fa-folder-plus"></i> Crear Lista</button>`;
        document.getElementById('viewControls').innerHTML = `
            <button class="btn-view ${listsViewMode==='grid'?'active':''}" id="listsGridBtn"><i class="fas fa-th-large"></i> Cuadrícula</button>
            <button class="btn-view ${listsViewMode==='table'?'active':''}" id="listsTableBtn"><i class="fas fa-list"></i> Tabla</button>`;
        document.getElementById('listsGridBtn')?.addEventListener('click',()=>{listsViewMode='grid';renderLists();});
        document.getElementById('listsTableBtn')?.addEventListener('click',()=>{listsViewMode='table';renderLists();});
        const container = document.getElementById('mainContent');
        if(listsViewMode === 'grid') {
            container.innerHTML = `<div class="grid">${filtered.map(l => `<div class="card" onclick="selectedListId='${l.id}'; renderCurrentView()"><span class="card-category">Lista</span><div class="card-title">${escapeHtml(l.name)}</div><div>📅 ${l.date || 'Sin fecha'}</div><div>🎵 ${l.items.length} canciones</div><div onclick="event.stopPropagation()"><button class="btn-icon" onclick="editListName('${l.id}')"><i class="fas fa-edit"></i></button><button class="btn-icon" onclick="deleteList('${l.id}')"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;
        } else {
            container.innerHTML = `<div class="list-view-container"><table><thead><tr><th>Nombre</th><th>Fecha</th><th>Canciones</th><th></th></tr></thead><tbody>${filtered.map(l => `<tr onclick="selectedListId='${l.id}'; renderCurrentView()"><td>${escapeHtml(l.name)}</td><td>${l.date || '—'}</td><td>${l.items.length}</td><td><button class="btn-icon" onclick="editListName('${l.id}'); event.stopPropagation()"><i class="fas fa-pen"></i></button><button class="btn-icon" onclick="deleteList('${l.id}'); event.stopPropagation()"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody>}</div>`;
        }
    }

    function renderListDetail() {
        const list = lists.find(l => l.id === selectedListId);
        if(!list) { selectedListId = null; renderLists(); return; }
        document.getElementById('actionHeader').innerHTML = `<button class="btn btn-ghost" onclick="selectedListId=null; renderCurrentView()"><i class="fas fa-arrow-left"></i> Volver</button><button class="btn btn-primary" onclick="openAddSongToListModal()"><i class="fas fa-plus"></i> Añadir Canción</button><button class="btn btn-ghost" onclick="printList('${list.id}')"><i class="fas fa-print"></i> Imprimir (9 copias)</button><button class="btn btn-ghost" onclick="shareListWhatsApp('${list.id}')"><i class="fab fa-whatsapp"></i> WhatsApp</button><button class="btn btn-ghost" onclick="exportListToExcel('${list.id}')"><i class="fas fa-file-excel"></i> Excel</button>`;
        document.getElementById('viewControls').innerHTML = '';
        const container = document.getElementById('mainContent');
        container.innerHTML = `<div class="card" style="margin-bottom:1rem"><h2>${escapeHtml(list.name)}</h2><p>${list.date || ''} • ${list.items.length} canciones</p></div><div id="dragArea"></div>`;
        const dragArea = document.getElementById('dragArea');
        dragArea.innerHTML = list.items.map((item, idx) => {
            const song = songs.find(s => s.id === item.songId);
            if(!song) return '';
            return `<div class="card" data-idx="${idx}" style="display:flex; align-items:center; gap:0.8rem; margin-bottom:0.5rem; cursor:grab;"><i class="fas fa-grip-vertical drag-handle"></i><div style="flex:1"><b>${escapeHtml(song.title)}</b> <span class="card-category">${song.category}</span><div>Tono: ${item.keyOverride || song.key} | 🥁 ${song.bpm || '--'} BPM</div></div><button class="btn-icon" onclick="openMetronome('${song.id}'); event.stopPropagation();" title="Metrónomo"><i class="fas fa-drumstick-bite"></i></button><button class="btn-icon" onclick="viewChords('${song.id}'); event.stopPropagation();" title="Acordes"><i class="fas fa-file-pdf"></i></button><button class="btn-icon" onclick="changeItemKey('${list.id}',${idx})"><i class="fas fa-sliders-h"></i></button><button class="btn-icon" onclick="removeSongFromList('${list.id}',${idx})"><i class="fas fa-times"></i></button></div>`;
        }).join('');
        if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(dragArea, { handle: '.drag-handle', animation: 200, onEnd: () => { const newOrder = Array.from(document.querySelectorAll('#dragArea .card')).map(el => list.items[parseInt(el.dataset.idx)]); list.items = newOrder; save(); renderListDetail(); } });
    }

    // ==================== RECURSOS (7 herramientas) ====================
    function renderResources() {
        document.getElementById('actionHeader').innerHTML = '';
        document.getElementById('viewControls').innerHTML = '';
        document.getElementById('mainContent').innerHTML = `
            <div class="grid">
                <div class="card" onclick="openTeleprompter()"><i class="fas fa-scroll" style="font-size:2rem"></i><h3>Teleprompter</h3><p>Letra gigante con toque</p></div>
                <div class="card" onclick="openBackupModal()"><i class="fas fa-database"></i><h3>Respaldo JSON</h3><p>Exportar / Importar datos</p></div>
                <div class="card" onclick="openTeamModal()"><i class="fas fa-users"></i><h3>Mi Equipo</h3><p>Gestionar miembros</p></div>
                <div class="card" onclick="openTuner()"><i class="fas fa-guitar"></i><h3>Afinador</h3><p>Guitarra / Bajo</p></div>
                <div class="card" onclick="openModulesLibrary()"><i class="fas fa-book-open"></i><h3>Centro de Capacitación</h3><p>Módulos con evaluación</p></div>
                <div class="card" onclick="viewAttendanceReport()"><i class="fas fa-clipboard-list"></i><h3>Reporte de Asistencia</h3><p>Solo lectura</p></div>
                <div class="card" onclick="viewShiftsCalendar()"><i class="fas fa-calendar-alt"></i><h3>Calendario de Turnos</h3><p>Próximos servicios</p></div>
            </div>
        `;
    }

    // --- Teleprompter ---
    function openTeleprompter() {
        const selectSongs = songs.map(s => `<option value="${s.id}">${escapeHtml(s.title)}</option>`).join('');
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `
            <h3>Teleprompter</h3>
            <select id="teleSongSelect" class="form-control">${selectSongs}</select>
            <div id="teleLyricsDisplay" class="teleprompter-screen" style="margin-top:1rem;" onclick="advanceLyrics()">Selecciona una canción</div>
            <div style="margin-top:1rem;"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>
        `;
        let currentLines = [], lineIndex = 0;
        window.advanceLyrics = () => {
            if(currentLines.length === 0) return;
            lineIndex = (lineIndex + 1) % currentLines.length;
            document.getElementById('teleLyricsDisplay').innerHTML = currentLines[lineIndex].replace(/\n/g,'<br>');
        };
        document.getElementById('teleSongSelect').addEventListener('change', (e) => {
            const song = songs.find(s => s.id === e.target.value);
            let lyrics = song.lyrics || "Letra no disponible.";
            currentLines = lyrics.split('\n').filter(l => l.trim());
            lineIndex = 0;
            document.getElementById('teleLyricsDisplay').innerHTML = currentLines[0] || "Sin letra";
        });
    }

    // --- Respaldo JSON ---
    function openBackupModal() {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `
            <h3>Respaldo y Restauración</h3>
            <button class="btn btn-primary" onclick="exportBackup()"><i class="fas fa-download"></i> Exportar respaldo</button>

    // --- Afinador ---
    function openTuner() {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `<div class="tuner-container"><h3>Afinador</h3><div class="tuner-note" id="tunerNote">--</div><div class="tuner-meter"><div class="tuner-needle" id="tunerNeedle"></div></div><p>Reproduce una nota en tu guitarra/bajo</p><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`;
        const noteElem = document.getElementById('tunerNote');
        const needleElem = document.getElementById('tunerNeedle');
        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { noteElem.innerText = "Sin acceso a micrófono"; return; }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);
            const detectPitch = () => {
                analyser.getFloatTimeDomainData(dataArray);
                let maxSample = 0;
                for(let i=0; i<bufferLength; i++) if(Math.abs(dataArray[i]) > maxSample) maxSample = Math.abs(dataArray[i]);
                if(maxSample < 0.01) { requestAnimationFrame(detectPitch); return; }
                let rms = 0;
                for(let i=0; i<bufferLength; i++) rms += dataArray[i]*dataArray[i];
                rms = Math.sqrt(rms/bufferLength);
                if(rms < 0.01) { requestAnimationFrame(detectPitch); return; }
                let autocorr = new Array(bufferLength);
                for(let lag=0; lag<bufferLength; lag++) {
                    let sum=0;
                    for(let i=0; i<bufferLength-lag; i++) sum += dataArray[i]*dataArray[i+lag];
                    autocorr[lag]=sum;
                }
                let maxVal=-1, maxLag=0;
                for(let lag=20; lag<bufferLength/2; lag++) {
                    if(autocorr[lag] > maxVal) { maxVal=autocorr[lag]; maxLag=lag; }
                }
                let freq = audioCtx.sampleRate / maxLag;
                const noteNames = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
                let noteNum = 12 * Math.log2(freq / 440) + 69;
                let roundedNote = Math.round(noteNum);
                let cents = Math.round((noteNum - roundedNote) * 100);
                let note = noteNames[roundedNote % 12];
                let octave = Math.floor(roundedNote / 12) - 1;
                if(freq > 70 && freq < 500) {
                    noteElem.innerText = `${note}${octave} (${cents>0?'+':''}${cents}¢)`;
                    let percent = Math.min(100, Math.max(0, 50 + (cents/50)*50));
                    needleElem.style.width = `${percent}%`;
                    if(Math.abs(cents) < 5) needleElem.style.background = "#10B981";
                    else needleElem.style.background = "#F59E0B";
                } else { noteElem.innerText = "--"; needleElem.style.width = "0%"; }
                requestAnimationFrame(detectPitch);
            };
            detectPitch();
        }).catch(err => { noteElem.innerText = "Permiso denegado"; });
    }

    function openModulesLibrary() {
        let html = `<h3>Centro de Capacitación</h3><div class="grid">`;
        modules.forEach(mod => {

    window.startModule = (moduleId) => {
        const mod = modules.find(m => m.id === moduleId);
        if(!mod) return;
        let currentQ = 0;
        let score = 0;
        let timer = null;
        const showQuestion = () => {
            if(currentQ >= mod.questions.length) {
                if(timer) clearInterval(timer);
                alert(`✅ Evaluación finalizada. Puntaje: ${score}/${mod.questions.length}`);
                closeModal();
                return;
            }
            const q = mod.questions[currentQ];
            let timeLeft = q.time;
            document.getElementById('modalBody').innerHTML = `
                <h3>${escapeHtml(mod.title)} - Pregunta ${currentQ+1}/${mod.questions.length}</h3>
                <p>${escapeHtml(q.text)}</p>
                ${q.options.map((opt, idx) => `<button class="btn btn-ghost" style="display:block; width:100%; margin:0.5rem 0;" onclick="answerQuestion(${idx})">${escapeHtml(opt)}</button>`).join('')}
                <div class="question-timer" id="timerDisplay">⏱️ ${timeLeft} seg</div>
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
            `;
            const timerDisplay = document.getElementById('timerDisplay');
            timer = setInterval(() => {
                timeLeft--;
                if(timerDisplay) timerDisplay.innerText = `⏱️ ${timeLeft} seg`;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("⏰ Tiempo agotado. Siguiente pregunta.");
                    currentQ++;
                    showQuestion();
                }
            }, 1000);
            window.answerQuestion = (selectedIdx) => {
                clearInterval(timer);
                if(selectedIdx === q.correct) score++;
                currentQ++;
                showQuestion();
            };
        };
        showQuestion();
    };

            led.classList.add('active');
            if(navigator.vibrate) navigator.vibrate(50);
            setTimeout(() => led.classList.remove('active'), 100);
        };
        startBtn.onclick = () => {
            if(isRunning) return;
            isRunning = true;
            tick();
            metronomeInterval = setInterval(() => { if(isRunning) tick(); }, intervalMs);
        };
        stopBtn.onclick = () => {
            if(metronomeInterval) clearInterval(metronomeInterval);
            isRunning = false;
        };
    }
    function viewChords(songId) {
        const song = songs.find(s => s.id === songId);
        if(!song) return;
        let content = '';
        if(song.chordsData) {
            const blob = dataURLtoBlob(song.chordsData);
            const url = URL.createObjectURL(blob);
            content = `<iframe src="${url}" style="width:100%; height:400px; border:none"></iframe><br><a href="${url}" download="acordes_${song.id}.pdf" class="btn btn-primary">Descargar archivo</a>`;
        } else if(song.chordsUrl) {
            content = `<iframe src="${song.chordsUrl}" style="width:100%; height:400px; border:none"></iframe><br><a href="${song.chordsUrl}" target="_blank" class="btn btn-primary">Abrir enlace</a>`;
        } else {
            content = `<p>No hay acordes cargados. Puedes editarla y agregar un enlace o subir un archivo.</p>`;
        }
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `
            <h3>Acordes / PDF: ${escapeHtml(song.title)}</h3>
            ${content}
            <div style="margin-top:1rem"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>
        `;
    }
    function dataURLtoBlob(dataURL) {
        const arr = dataURL.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type: mime});
    }
    function printList(listId) {
        const list = lists.find(l => l.id === listId);
        if(!list || list.items.length === 0) return alert("La lista está vacía");
        const win = window.open();
        win.document.write(`
            <html><head><title>${escapeHtml(list.name)}</title><style>body{font-family:sans-serif;margin:0.2cm}.print-area{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.print-card{border:1px solid #000;border-radius:8px;padding:6px;break-inside:avoid}.print-title{font-weight:bold;text-align:center;border-bottom:1px solid #aaa;margin-bottom:4px}.print-song{font-size:8pt;margin:2px 0}.print-footer{font-size:6pt;text-align:center;margin-top:4px}</style></head><body><div class="print-area">
        `);
        for(let i=0; i<12; i++) {
            win.document.write(`<div class="print-card"><div class="print-title">${escapeHtml(list.name)}</div>`);
            list.items.forEach(item => {
                const s = songs.find(s => s.id === item.songId);
                if(s) win.document.write(`<div class="print-song">🎵 ${escapeHtml(s.title)} (${item.keyOverride || s.key})</div>`);
            });
            win.document.write(`<div class="print-footer">Praise Engine FZ® v2.0 |Powered by GEOCJDJ</div></div>`);
        }
        win.document.write('</div></body></html>');
        win.document.close();
        win.print();
    }
    function exportListToExcel(listId) {
        const list = lists.find(l => l.id === listId);
        const data = [["Canción", "Tonalidad"]];
        list.items.forEach(item => {
            const s = songs.find(s => s.id === item.songId);
            if(s) data.push([s.title, item.keyOverride || s.key]);
        });
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, list.name.slice(0,31));
        XLSX.writeFile(wb, `${list.name.replace(/[^a-z0-9]/gi,'_')}.xlsx`);
    }
    function shareListWhatsApp(listId) {
        const list = lists.find(l => l.id === listId);
        if(!list || list.items.length===0) return alert("Lista vacía");
        let message = `🎵 *${list.name}* 🎵\n`;
        list.items.forEach((item, i) => {
            const song = songs.find(s => s.id === item.songId);
            if(song) message += `${i+1}. ${song.title} (${item.keyOverride || song.key})\n`;
        });
        const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    // ==================== INICIALIZACIÓN ====================
    const darkToggle = document.getElementById('darkModeToggle');
    darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('iec_darkmode', document.body.classList.contains('dark'));
        darkToggle.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> Modo Claro' : '<i class="fas fa-moon"></i> Modo Oscuro';
    });
    if(localStorage.getItem('iec_darkmode') === 'true') {
        document.body.classList.add('dark');
        darkToggle.innerHTML = '<i class="fas fa-sun"></i> Modo Claro';
    }
    document.querySelectorAll('.nav-item[data-tab]').forEach(el => {
        el.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            currentTab = el.dataset.tab;
            selectedListId = null;
            renderCurrentView();
        });
    });
    renderCurrentView();
</script>
