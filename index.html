    <style>
        /* ========== ESTILOS COMPLETOS (sin cambios en diseño) ========== */
        :root {
            --primary: #1E3A8A;
            --primary-light: #3B82F6;
            --primary-rgb: 30, 58, 138;
            --bg-app: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --radius-lg: 1.5rem;
            --radius-sm: 1rem;
        }
        body.dark {
            --primary: #3B82F6;
            --primary-light: #60A5FA;
            --primary-rgb: 59, 130, 246;
            --bg-app: #0F172A;
            --surface: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); transition: 0.2s; }
        .app-header { background: var(--surface); padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .app-title { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
        .app-title i { font-size: 1.5rem; color: var(--primary); background: none; }
        .nav-icons { display: flex; overflow-x: auto; gap: 0.75rem; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; min-width: 65px; padding: 0.5rem; cursor: pointer; color: var(--text-muted); font-size: 0.7rem; font-weight: 600; border-radius: var(--radius-sm); }
        .nav-item i { font-size: 1.3rem; padding: 0.5rem; border-radius: 1rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--primary); background: rgba(var(--primary-rgb), 0.1); }
        .nav-item.active i { background: var(--primary); color: white; }
        .dark-mode-toggle, .user-info { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; background: var(--bg-app); padding: 0.5rem 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border); font-weight: 600; font-size: 0.8rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .search-container { position: relative; margin-bottom: 1rem; }
        .search-box { width: 100%; background: var(--surface); border: 2px solid var(--border); padding: 0.9rem 1rem 0.9rem 3rem; border-radius: var(--radius-lg); font-size: 1rem; color: var(--text-main); }
        .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .view-controls { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .btn-view { border: 2px solid var(--border); background: var(--surface); padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
        .btn-view.active { background: var(--primary); color: white; border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 1.2rem; border: 1px solid var(--border); box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .card-category { font-size: 0.7rem; font-weight: 800; background: var(--primary); color: white; padding: 0.2rem 0.7rem; border-radius: 50px; display: inline-block; margin-bottom: 0.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 0.5rem 0; line-height: 1.3; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 2rem; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; border: 2px solid var(--border); color: var(--text-muted); }
        .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { background: var(--surface); width: 100%; max-width: 800px; max-height: 85vh; border-radius: 2rem; padding: 1.5rem; overflow-y: auto; }

        .tuner-needle { height: 100%; width: 0%; background: var(--primary); transition: width 0.05s linear; }
        .question-timer { font-size: 1.2rem; font-weight: bold; color: var(--primary); text-align: center; margin: 0.5rem 0; }
        .admin-tab { display: none; }

        .cifra-header { background: #1E293B; padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .cifra-title-area h2 { font-size: 1.4rem; font-weight: 800; color: #FFFFFF; }
        .cifra-title-area p { font-size: 0.85rem; color: #94A3B8; }
        .cifra-toolbar { background: #1E293B; padding: 0.75rem 1rem; display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #334155; }
        .tool-group { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 700; color: #94A3B8; }
        .cifra-btn { background: #334155; color: white; border: none; padding: 0.5rem 0.9rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem; transition: 0.2s; }

        .cifra-btn-close { background: #EF4444; }

        .cifra-body { flex: 1; overflow-y: auto; padding: 1.5rem 1rem; background: #0F172A; scroll-behavior: smooth; }
        .cifra-content-wrapper { max-width: 750px; margin: 0 auto; font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; white-space: pre-wrap; line-height: 1.8; }
        .metronome-dot { width: 12px; height: 12px; background: #475569; border-radius: 50%; transition: 0.1s ease; }
        .metronome-dot.pulse { background: #10B981; box-shadow: 0 0 10px #10B981; }
        .chord { color: #F59E0B; font-weight: bold; background: rgba(245, 158, 11, 0.1); padding: 0 3px; border-radius: 4px; display: inline-block; }
        .list-view-container { overflow-x: auto; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1rem; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-muted); font-weight: 600; }
        @media (max-width: 640px) { .app-title { font-size: 0.9rem; } .nav-item { min-width: 55px; } .cifra-toolbar { gap: 0.6rem; padding: 0.5rem; } }
        @media print { .app-header, .search-container, .view-controls, #actionHeader, .modal, .btn, .user-info, .cifra-toolbar, .cifra-btn-close { display: none !important; } .print-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; } .print-card { border: 1px solid #000; border-radius: 8px; padding: 6px; break-inside: avoid; } .print-title { font-weight: bold; text-align: center; border-bottom: 1px solid #aaa; margin-bottom: 4px; } .print-song { font-size: 8pt; margin: 2px 0; } .print-footer { font-size: 6pt; text-align: center; margin-top: 4px; } .cifra-modal { display: block !important; position: relative !important; height: auto !important; background: white !important; color: black !important; } .cifra-body { background: white !important; } .cifra-content-wrapper { color: black !important; } .chord { color: black !important; background: none !important; border-bottom: 1px dashed #000; } }
    </style>
</head>
<body>
    <div id="appRoot"></div>

    <div id="cifraClubModal" class="cifra-modal">
        <div class="cifra-header">
            <div class="cifra-title-area">
                <h2 id="cifraModalTitle">Título de la Canción</h2>

            <button class="cifra-btn cifra-btn-close" onclick="closeCifraViewer()">

        <div class="cifra-toolbar">

            </div>
            <div class="tool-group">
                <span>BPM:</span>
                <input type="number" id="cifraBpmInput" style="width:55px; background:#1e293b; border:1px solid #475569; color:white; padding:4px; border-radius:4px; text-align:center;" min="40" max="250" onchange="updateSongBpm()">
                <button id="btnMetronomeToggle" class="cifra-btn" onclick="toggleCifraMetronome()">
                    <i class="fa-solid fa-drum"></i> Iniciar

            <button class="cifra-btn" style="background:#0284c7;" onclick="window.print()">

        <div id="cifraBodyContainer" class="cifra-body">

<script>
    // ==================== CONFIGURACIÓN SUPABASE ====================
    const SUPABASE_URL = 'https://mudcrmgaqejmpyeyocmt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZGNybWdhcWVqbXB5ZXlvY210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTg2MzUsImV4cCI6MjA5NDM3NDYzNX0.Izf3hp-JHgkWH00kEpSMitSo61pMtGeQh-6PimhcNIU';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let songs = [], lists = [], team = [], attendance = [], shifts = [], modules = [];
    let currentTab = 'songs', selectedListId = null, viewMode = 'table', listsViewMode = 'grid';
    let sortableInstance = null, metronomeInterval = null, adminVisible = false;
    const keys = ["C","Cm","C#","C#m","D","Dm","D#","D#m","E","Em","F","Fm","F#","F#m","G","Gm","G#","G#m","A","Am","A#","A#m","B","Bm"];
    const noteMap = { 'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11 };
    const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    let cifraCurrentSong = null;
    let cifraOriginalLyrics = "";
    let cifraSemitonesShift = 0;
    let cifraScrollInterval = null;
    let cifraScrollSpeed = 35;
    let cifraFontSize = 18;
    let cifraMetroInterval = null;
    let cifraMetroRunning = false;

    // ==================== FUNCIONES AUXILIARES ====================
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]); }
    function closeModal() { document.getElementById('modal')?.remove(); }
    function showModal(content) { const div = document.createElement('div'); div.id = 'modal'; div.className = 'modal'; div.style.display = 'flex'; div.innerHTML = `<div class="modal-content">${content}</div>`; document.body.appendChild(div); }
    function dataURLtoBlob(dataURL) { const arr = dataURL.split(','); const mime = arr[0].match(/:(.*?);/)[1]; const bstr = atob(arr[1]); let n = bstr.length; const u8arr = new Uint8Array(n); while (n--) u8arr[n] = bstr.charCodeAt(n); return new Blob([u8arr], {type: mime}); }
    
    function transposeChord(chord, semitones) {
        const match = chord.match(/^([A-G][#b]?)(.*)$/);
        if (!match) return chord;
        let base = match[1], suffix = match[2];
        let idx = noteMap[base];
        if (idx === undefined) return chord;
        let newIdx = (idx + semitones + 12) % 12;
        return noteNames[newIdx] + suffix;
    }
    function transposeLyrics(text, fromKey, toKey) {
        if (!text || !fromKey || !toKey || fromKey === toKey) return text;
        const fromBase = fromKey.replace(/m$/, ''), toBase = toKey.replace(/m$/, '');
        let semitones = (noteMap[toBase] - noteMap[fromBase] + 12) % 12;
        if (fromKey.endsWith('m')) semitones = (semitones + 12) % 12;
        if (toKey.endsWith('m') && !fromKey.endsWith('m')) semitones = (semitones + 12) % 12;
        return text.replace(/\[([A-G][#b]?[^\]]*)\]/g, (match, chord) => `[${transposeChord(chord, semitones)}]`);
    }

    // ==================== AUTENTICACIÓN ====================
    async function login(email, password) {
        try {
            const { error, data } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = data.user;
            await loadUserData();
            renderApp();
        } catch (err) { alert("Error al iniciar sesión: " + err.message); }
    }
    async function resetPassword(email) {
        try {
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if (error) throw error;
            alert("Se ha enviado un enlace para restablecer tu contraseña a tu correo.");
        } catch(err) { alert("Error: " + err.message); }
    }
    async function logout() { await supabaseClient.auth.signOut(); currentUser = null; renderLogin(); }
    function renderRegister() {
        document.getElementById('appRoot').innerHTML = `
            <div class="login-container">
                <i class="fas fa-church" style="font-size: 3rem; color: var(--primary);"></i>
                <h2>Crear Cuenta</h2>
                <div class="form-group"><input type="text" id="regName" class="form-control" placeholder="Tu nombre completo"></div>
                <div class="form-group"><input type="email" id="regEmail" class="form-control" placeholder="Correo electrónico"></div>
                <div class="form-group"><input type="password" id="regPass" class="form-control" placeholder="Contraseña"></div>
                <div class="form-group"><input type="password" id="regConfirmPass" class="form-control" placeholder="Confirmar contraseña"></div>
                <button class="btn btn-primary w-100 mb-2" onclick="registerUser()">Registrarme</button>
                <button class="btn btn-ghost w-100" onclick="renderLogin()">Volver al inicio de sesión</button>
            </div>`;
    }
    async function registerUser() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const confirm = document.getElementById('regConfirmPass').value;
        if (!name || !email || !password) { alert("Completa todos los campos"); return; }
        if (password !== confirm) { alert("Las contraseñas no coinciden"); return; }
        try {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user) {
                await supabaseClient.from('perfiles').upsert([{ id: data.user.id, email: email, nombre: name }]);
                alert("Registro exitoso. Revisa tu correo para confirmar. Ahora puedes iniciar sesión.");
                renderLogin();
            }
        } catch (err) {
            if (err.message.includes("User already registered")) alert("Este correo ya está registrado.");
            else alert("Error en el registro: " + err.message);
        }
    }
    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div class="login-container">
                <i class="fas fa-church" style="font-size: 3rem; color: var(--primary);"></i>
                <h2>Praise Engine FZ® Cloud</h2>
                <div class="form-group"><input type="email" id="loginEmail" class="form-control" placeholder="Email"></div>
                <div class="form-group"><input type="password" id="loginPass" class="form-control" placeholder="Contraseña"></div>
                <button class="btn btn-primary w-100 mb-2" onclick="login(loginEmail.value, loginPass.value)">Iniciar Sesión</button>
                <button class="btn btn-ghost w-100 mb-2" onclick="renderRegister()">Registrarse</button>
                <div style="text-align: center; margin-top: 10px;"><a href="#" onclick="showResetPassword()" class="text-accent small">¿Olvidaste tu contraseña?</a></div>
            </div>`;
        window.showResetPassword = () => { const email = prompt("Introduce tu email:"); if(email) resetPassword(email); };
    }

    // ==================== CARGA Y GUARDADO EN SUPABASE ====================
    async function loadUserData() {
        if (!currentUser) return;
        try {
            const { data: s } = await supabaseClient.from('canciones').select('*').eq('user_id', currentUser.id);
            songs = s || [];
            const { data: l } = await supabaseClient.from('listas').select('*').eq('user_id', currentUser.id);
            lists = l || [];
            for (let list of lists) {
                const { data: items } = await supabaseClient.from('lista_items').select('*').eq('lista_id', list.id).order('orden');
                list.items = items || [];
            }
            const { data: t } = await supabaseClient.from('equipo').select('*').eq('user_id', currentUser.id);
            team = t || [];
            const { data: a } = await supabaseClient.from('asistencia').select('*').eq('user_id', currentUser.id);
            attendance = a || [];
            const { data: sh } = await supabaseClient.from('turnos').select('*').eq('user_id', currentUser.id);
            shifts = sh || [];
            const { data: m } = await supabaseClient.from('modulos').select('*').eq('user_id', currentUser.id);
            modules = m || [];
            if (modules.length === 0) {
                const defaultModules = [
                    { id: 'mod1', title: 'Teología de la Adoración', content: '<p>La adoración es respuesta a la revelación de Dios...</p>', questions: [{ text: '¿Qué es la adoración?', options: ['Un estilo musical', 'Respuesta a Dios', 'Un ritual'], correct: 1, time: 20 }] },
                    { id: 'mod2', title: 'Liderazgo Servicial', content: '<p>El líder sirve como Jesús...</p>', questions: [{ text: '¿Cuál es la base del liderazgo cristiano?', options: ['Autoridad', 'Servicio', 'Carisma'], correct: 1, time: 20 }] }
                ];
                for (let mod of defaultModules) {
                    await supabaseClient.from('modulos').upsert({ id: mod.id, user_id: currentUser.id, title: mod.title, content: mod.content, questions: mod.questions }, { onConflict: 'id' });
                }
                const { data: newM } = await supabaseClient.from('modulos').select('*').eq('user_id', currentUser.id);
                modules = newM || [];
            }
        } catch(e) { console.error("Error cargando datos:", e); alert("Error al cargar datos. Recarga la página."); }
    }
    async function saveSong(song) {
        try {
            if (song.id && songs.some(s => s.id === song.id)) {
                await supabaseClient.from('canciones').update(song).eq('id', song.id);
            } else {
                if(!song.id) song.id = Date.now().toString();
                song.user_id = currentUser.id;
                await supabaseClient.from('canciones').insert(song);
            }
            await loadUserData();
            renderCurrentView();
            return true;
        } catch (err) { console.error("Error guardando canción:", err); alert("Error al guardar: " + err.message); return false; }
    }
    async function deleteSong(id) { await supabaseClient.from('canciones').delete().eq('id', id); await loadUserData(); renderCurrentView(); }
    async function saveList(list) {
        try {
            if (list.id) {
                await supabaseClient.from('listas').update({ name: list.name, date: list.date }).eq('id', list.id);
                await supabaseClient.from('lista_items').delete().eq('lista_id', list.id);
                for (let i = 0; i < list.items.length; i++) {
                    const item = list.items[i];
                    await supabaseClient.from('lista_items').insert({ lista_id: list.id, song_id: item.songId || item.song_id, key_override: item.keyOverride || item.key_override || null, orden: i });
                }
            } else {
                const newId = Date.now().toString();
                await supabaseClient.from('listas').insert({ id: newId, user_id: currentUser.id, name: list.name, date: list.date });
                for (let i = 0; i < list.items.length; i++) {
                    const item = list.items[i];
                    await supabaseClient.from('lista_items').insert({ lista_id: newId, song_id: item.songId || item.song_id, key_override: item.keyOverride || item.key_override || null, orden: i });
                }
            }
            await loadUserData(); renderCurrentView();
        } catch(e) { console.error("Error guardando lista:", e); alert("Error al guardar la lista."); }
    }
    async function deleteList(id) { await supabaseClient.from('listas').delete().eq('id', id); if (selectedListId === id) selectedListId = null; await loadUserData(); renderCurrentView(); }
    async function saveTeam(members) { team = members; await supabaseClient.from('equipo').delete().eq('user_id', currentUser.id); for (let m of team) await supabaseClient.from('equipo').insert(m); await loadUserData(); renderCurrentView(); }
    async function saveAttendance(reg) { attendance = reg; await supabaseClient.from('asistencia').delete().eq('user_id', currentUser.id); for (let a of attendance) await supabaseClient.from('asistencia').insert(a); }
    async function saveShifts(sh) { shifts = sh; await supabaseClient.from('turnos').delete().eq('user_id', currentUser.id); for (let s of shifts) await supabaseClient.from('turnos').insert(s); }
    async function saveModules(mods) { modules = mods; for (let m of modules) { m.user_id = currentUser.id; await supabaseClient.from('modulos').upsert(m, { onConflict: 'id' }); } await loadUserData(); }

    function openSongModal(id=null) {
        const s = songs.find(s => s.id === id) || { title: '', category: 'Adoración', key: 'C', bpm: 80, chordsUrl: '', chordsData: '', lyrics: '' };
        showModal(`<h3>${id ? 'Editar' : 'Nueva'} Canción</h3>

            <div class="form-group"><label>Tonalidad</label><select id="mKey" class="form-control">${keys.map(k => `<option ${s.key===k?'selected':''}>${k}</option>`).join('')}</select></div>

    }
    async function saveSongFromModal(id) {
        const title = document.getElementById('mTitle').value.trim();
        if (!title) return alert("Título requerido");
        const file = document.getElementById('mChordsFile').files[0];
        let chordsData = '';
        if (file) { const reader = new FileReader(); await new Promise(resolve => { reader.onload = e => { chordsData = e.target.result; resolve(); }; reader.readAsDataURL(file); }); }
        const song = {
            id: id || Date.now().toString(),
            title, category: document.getElementById('mCat').value, key: document.getElementById('mKey').value,
            bpm: parseInt(document.getElementById('mBpm').value) || 80,
            chordsUrl: document.getElementById('mChordsUrl').value.trim(),
            chordsData: chordsData || (id ? songs.find(s=>s.id===id)?.chordsData : ''),
            lyrics: document.getElementById('mLyrics').value, youtube: ''
        };
        await saveSong(song);
        closeModal();
    }
    async function openLyricsEditor(songId) {
        const song = songs.find(s => s.id === songId);
        if (!song) return;
        let lyrics = song.lyrics || '';
        showModal(`
            <h3>Editar Letra y Acordes: ${escapeHtml(song.title)}</h3>
            <div style="display:flex; gap:1rem; margin-bottom:1rem; align-items:center;">
                <label>Tonalidad actual:</label>
                <select id="transposeFromKey" class="form-control" style="width:100px;">${keys.map(k => `<option ${song.key===k?'selected':''}>${k}</option>`).join('')}</select>
                <label>Transponer a:</label>
                <select id="transposeToKey" class="form-control" style="width:100px;">${keys.map(k => `<option>${k}</option>`).join('')}</select>
                <button class="btn btn-primary" onclick="applyTranspose()">Transponer</button>
            </div>
            <div class="form-group"><label>Letra (usa [Acorde] antes de la sílaba)</label><textarea id="lyricsEditor" rows="12" class="form-control" style="font-family: monospace;">${escapeHtml(lyrics)}</textarea></div>
            <div style="text-align:right"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveLyrics('${song.id}')">Guardar Letra</button></div>
        `);
        window.applyTranspose = () => {
            const fromKey = document.getElementById('transposeFromKey').value;
            const toKey = document.getElementById('transposeToKey').value;
            const textarea = document.getElementById('lyricsEditor');
            textarea.value = transposeLyrics(textarea.value, fromKey, toKey);
            document.getElementById('transposeFromKey').value = toKey;
        };
        window.saveLyrics = async (id) => {
            const newLyrics = document.getElementById('lyricsEditor').value;
            const songToUpdate = songs.find(s => s.id === id);
            if (songToUpdate) { songToUpdate.lyrics = newLyrics; await saveSong(songToUpdate); }
            closeModal();
        };
    }

    async function addSongToList(listId, songId) {
        const list = lists.find(l => l.id === listId);
        if (!list.items) list.items = [];
        if (list.items.some(item => (item.songId || item.song_id) === songId)) return alert("Esta canción ya está en la lista.");
        list.items.push({ songId: songId, keyOverride: null });
        await saveList(list);
        renderListDetail();
    }
    async function removeSongFromList(listId, idx) {
        if(confirm("¿Quitar canción de la lista?")) {
            const list = lists.find(l => l.id === listId);
            list.items.splice(idx, 1);
            await saveList(list);
            renderListDetail();
        }
    }
    async function changeItemKey(listId, idx) {
        const list = lists.find(l => l.id === listId);
        const item = list.items[idx];
        const song = songs.find(s => s.id === (item.songId || item.song_id));
        const newKey = prompt(`Cambiar tonalidad de "${song.title}" para esta lista:`, item.keyOverride || item.key_override || song.key);
        if (newKey && keys.includes(newKey)) { item.keyOverride = newKey; await saveList(list); renderListDetail(); }
        else if (newKey) alert("Tonalidad no válida.");
    }
    function exportAllListsToExcel() {
        const data = [["Lista", "Canción", "Categoría", "Tonalidad"]];
        lists.forEach(list => { if(list.items) list.items.forEach(item => { const song = songs.find(s => s.id === (item.songId || item.song_id)); if (song) data.push([list.name, song.title, song.category, item.keyOverride || item.key_override || song.key]); }); });
        const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Todas_Listas"); XLSX.writeFile(wb, "todas_listas_iec.xlsx");
    }

    function openTeleprompter() {
        const selectSongs = songs.map(s => `<option value="${s.id}">${escapeHtml(s.title)}</option>`).join('');
        showModal(`<h3>Teleprompter</h3><select id="teleSongSelect" class="form-control"><option value="">Selecciona canción...</option>${selectSongs}</select><div id="teleLyricsDisplay" class="teleprompter-screen" style="margin-top:1rem;" onclick="advanceLyrics()">Selecciona una canción de la lista superior</div><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>`);

        showModal(`<div class="tuner-container"><h3>Afinador Instrumental</h3><div class="tuner-note" id="tunerNote">--</div><div class="tuner-meter"><div class="tuner-needle" id="tunerNeedle"></div></div><p>Toca una cuerda al aire cerca del micrófono</p><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
        const noteElem = document.getElementById('tunerNote'); const needleElem = document.getElementById('tunerNeedle');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { noteElem.innerText = "Sin acceso a micro"; return; }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048; source.connect(analyser);
            const bufferLength = analyser.frequencyBinCount; const dataArray = new Float32Array(bufferLength);
            const detectPitch = () => { if(!document.getElementById('tunerNote')) return; analyser.getFloatTimeDomainData(dataArray); let maxSample = 0; for (let i=0; i<bufferLength; i++) if (Math.abs(dataArray[i]) > maxSample) maxSample = Math.abs(dataArray[i]); if (maxSample < 0.01) { requestAnimationFrame(detectPitch); return; } let autocorr = new Array(bufferLength); for (let lag=0; lag<bufferLength; lag++) { let sum=0; for (let i=0; i<bufferLength-lag; i++) sum += dataArray[i]*dataArray[i+lag]; autocorr[lag]=sum; } let maxVal=-1, maxLag=0; for (let lag=20; lag<bufferLength/2; lag++) if (autocorr[lag] > maxVal) { maxVal=autocorr[lag]; maxLag=lag; } let freq = audioCtx.sampleRate / maxLag; let noteNum = 12 * Math.log2(freq / 440) + 69; let roundedNote = Math.round(noteNum); let cents = Math.round((noteNum - roundedNote) * 100); let note = noteNames[roundedNote % 12]; if (freq > 50 && freq < 600) { noteElem.innerText = `${note} (${cents>0?'+':''}${cents}¢)`; let percent = Math.min(100, Math.max(0, 50 + (cents/50)*50)); needleElem.style.width = `${percent}%`; needleElem.style.background = Math.abs(cents) < 5 ? "#10B981" : "#F59E0B"; } else { noteElem.innerText = "--"; needleElem.style.width = "0%"; } requestAnimationFrame(detectPitch); };
            detectPitch();
        }).catch(() => { if(noteElem) noteElem.innerText = "Permiso denegado"; });

    function getShiftedKey(origKey, shift) {

        const base = origKey.replace(/m$/, '');
        let idx = noteMap[base];
        if (idx === undefined) return origKey;
        let newIdx = (idx + shift + 12) % 12;
        return noteNames[newIdx] + (isMinor ? 'm' : '');
    }

        if (cifraMetroRunning) {
            clearInterval(cifraMetroInterval); cifraMetroRunning = false;
            btn.innerHTML = `<i class="fa-solid fa-drum"></i> Iniciar`; dot.classList.remove('pulse');
        } else {
            cifraMetroRunning = true; btn.innerHTML = `<i class="fa-solid fa-pause"></i> Pausa`;
            let bpm = parseInt(document.getElementById('cifraBpmInput').value) || 80;
            cifraMetroInterval = setInterval(() => { dot.classList.add('pulse'); if (navigator.vibrate) navigator.vibrate(30); setTimeout(() => dot.classList.remove('pulse'), 90); }, 60000 / bpm);
        }
    }
    function toggleCifraAutoScroll() {
        const btn = document.getElementById('btnAutoScrollToggle');
        const container = document.getElementById('cifraBodyContainer');
        if (cifraScrollInterval) { clearInterval(cifraScrollInterval); cifraScrollInterval = null; btn.innerHTML = `<i class="fa-solid fa-play"></i> Play`; }
        else { btn.innerHTML = `<i class="fa-solid fa-pause"></i> Pausa`; cifraScrollInterval = setInterval(() => { container.scrollTop += 1; if (container.scrollTop >= (container.scrollHeight - container.clientHeight)) { clearInterval(cifraScrollInterval); cifraScrollInterval = null; btn.innerHTML = `<i class="fa-solid fa-play"></i> Play`; } }, cifraScrollSpeed); }
    }
    function adjustScrollSpeed(delta) { cifraScrollSpeed += delta; if (cifraScrollSpeed < 10) cifraScrollSpeed = 10; if (cifraScrollSpeed > 150) cifraScrollSpeed = 150; if (cifraScrollInterval) { toggleCifraAutoScroll(); toggleCifraAutoScroll(); } }
    function adjustCifraFontSize(delta) { cifraFontSize += delta; if (cifraFontSize < 12) cifraFontSize = 12; if (cifraFontSize > 36) cifraFontSize = 36; document.getElementById('cifraContentWrapper').style.fontSize = cifraFontSize + 'px'; }
    async function saveCifraStateToServer() {
        if (!cifraCurrentSong) return;
        let finalKey = getShiftedKey(cifraCurrentSong.key, cifraSemitonesShift);
        let finalBpm = parseInt(document.getElementById('cifraBpmInput').value) || 80;
        cifraCurrentSong.key = finalKey; cifraCurrentSong.bpm = finalBpm;
        let success = await saveSong(cifraCurrentSong);
        if (success) { alert("¡Tono y BPM predeterminados guardados con éxito en la nube!"); cifraSemitonesShift = 0; }
    }

    // ==================== INICIALIZACIÓN ====================
    (async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) { currentUser = session.user; await loadUserData(); renderApp(); }
        else { renderLogin(); }
    })();
</script>
