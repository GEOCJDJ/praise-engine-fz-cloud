<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Praise Engine FZ® Cloud | I.E.C. Fortaleza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1E3A8A;
            --primary-light: #3B82F6;
            --primary-rgb: 30, 58, 138;
            --bg-app: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --radius-lg: 1.5rem;
            --radius-sm: 1rem;
        }
        body.dark {
            --primary: #3B82F6;
            --primary-light: #60A5FA;
            --primary-rgb: 59, 130, 246;
            --bg-app: #0F172A;
            --surface: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); transition: 0.2s; }
        .app-header { background: var(--surface); padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .app-title { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
        .app-title i { font-size: 1.5rem; color: var(--primary); background: none; }
        .nav-icons { display: flex; overflow-x: auto; gap: 0.75rem; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; min-width: 65px; padding: 0.5rem; cursor: pointer; color: var(--text-muted); font-size: 0.7rem; font-weight: 600; border-radius: var(--radius-sm); }
        .nav-item i { font-size: 1.3rem; padding: 0.5rem; border-radius: 1rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--primary); background: rgba(var(--primary-rgb), 0.1); }
        .nav-item.active i { background: var(--primary); color: white; }
        .dark-mode-toggle, .user-info { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; background: var(--bg-app); padding: 0.5rem 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border); font-weight: 600; font-size: 0.8rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .search-container { position: relative; margin-bottom: 1rem; }
        .search-box { width: 100%; background: var(--surface); border: 2px solid var(--border); padding: 0.9rem 1rem 0.9rem 3rem; border-radius: var(--radius-lg); font-size: 1rem; color: var(--text-main); }
        .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .view-controls { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .btn-view { border: 2px solid var(--border); background: var(--surface); padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
        .btn-view.active { background: var(--primary); color: white; border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 1.2rem; border: 1px solid var(--border); box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .card-category { font-size: 0.7rem; font-weight: 800; background: var(--primary); color: white; padding: 0.2rem 0.7rem; border-radius: 50px; display: inline-block; margin-bottom: 0.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 0.5rem 0; line-height: 1.3; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 2rem; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; border: 2px solid var(--border); color: var(--text-muted); }
        .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { background: var(--surface); width: 100%; max-width: 600px; max-height: 85vh; border-radius: 2rem; padding: 1.5rem; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-control { width: 100%; padding: 0.8rem; border-radius: var(--radius-lg); border: 2px solid var(--border); background: var(--bg-app); color: var(--text-main); }
        .login-container { max-width: 450px; margin: 2rem auto; background: var(--surface); border-radius: 2rem; padding: 2rem; text-align: center; box-shadow: var(--shadow); }
        .text-accent { color: var(--primary); text-decoration: none; }
        .text-accent:hover { text-decoration: underline; }
        .teleprompter-screen { font-size: 2rem; text-align: center; padding: 2rem; background: #000; color: white; border-radius: 2rem; min-height: 300px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .tuner-container { text-align: center; }
        .tuner-note { font-size: 4rem; font-weight: 800; font-family: monospace; }
        .tuner-meter { width: 100%; height: 12px; background: #ddd; border-radius: 20px; margin: 1rem 0; overflow: hidden; }
        .tuner-needle { height: 100%; width: 0%; background: var(--primary); transition: width 0.05s linear; }
        .question-timer { font-size: 1.2rem; font-weight: bold; color: var(--primary); text-align: center; margin: 0.5rem 0; }
        .admin-tab { display: none; }
        @media (max-width: 640px) { .app-title { font-size: 0.9rem; } .nav-item { min-width: 55px; } }
        @media print { .app-header, .search-container, .view-controls, #actionHeader, .modal, .btn, .user-info { display: none; } .print-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; } .print-card { border: 1px solid #000; border-radius: 8px; padding: 6px; break-inside: avoid; } .print-title { font-weight: bold; text-align: center; border-bottom: 1px solid #aaa; margin-bottom: 4px; } .print-song { font-size: 8pt; margin: 2px 0; } .print-footer { font-size: 6pt; text-align: center; margin-top: 4px; } }
    </style>
</head>
<body><div id="appRoot"></div>
<script>
    // ==================== CONFIGURACIÓN SUPABASE ====================
    const SUPABASE_URL = 'https://tusubdominio.supabase.co';   // REEMPLAZA
    const SUPABASE_ANON_KEY = 'tu-clave-anon-publica';        // REEMPLAZA
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let songs = [], lists = [], team = [], attendance = [], shifts = [], modules = [];
    let currentTab = 'songs', selectedListId = null, viewMode = 'table', listsViewMode = 'grid';
    let sortableInstance = null, metronomeInterval = null, adminVisible = false;
    const keys = ["C","Cm","C#","C#m","D","Dm","D#","D#m","E","Em","F","Fm","F#","F#m","G","Gm","G#","G#m","A","Am","A#","A#m","B","Bm"];

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function closeModal() { document.getElementById('modal')?.remove(); }
    function showModal(content) { const div = document.createElement('div'); div.id = 'modal'; div.className = 'modal'; div.style.display = 'flex'; div.innerHTML = `<div class="modal-content">${content}</div>`; document.body.appendChild(div); }

    // ==================== AUTENTICACIÓN ====================
    async function login(email, password) {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await loadUserData();
        renderApp();
    }

    async function resetPassword(email) {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
        if (error) throw error;
        alert("Se ha enviado un enlace para restablecer tu contraseña a tu correo.");
    }

    async function logout() { await supabaseClient.auth.signOut(); currentUser = null; renderLogin(); }

    // NUEVA PANTALLA DE REGISTRO
    function renderRegister() {
        document.getElementById('appRoot').innerHTML = `
            <div class="login-container">
                <i class="fas fa-church" style="font-size: 3rem; color: var(--primary);"></i>
                <h2>Crear Cuenta</h2>
                <div class="form-group">
                    <input type="text" id="regName" class="form-control" placeholder="Tu nombre completo">
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" class="form-control" placeholder="Correo electrónico">
                </div>
                <div class="form-group">
                    <input type="password" id="regPass" class="form-control" placeholder="Contraseña">
                </div>
                <div class="form-group">
                    <input type="password" id="regConfirmPass" class="form-control" placeholder="Confirmar contraseña">
                </div>
                <button class="btn btn-primary w-100 mb-2" onclick="registerUser()">Registrarme</button>
                <button class="btn btn-ghost w-100" onclick="renderLogin()">Volver al inicio de sesión</button>
            </div>
        `;
    }

    async function registerUser() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const confirm = document.getElementById('regConfirmPass').value;

        if (!name || !email || !password) {
            alert("Por favor completa todos los campos");
            return;
        }
        if (password !== confirm) {
            alert("Las contraseñas no coinciden");
            return;
        }

        try {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;

            if (data.user) {
                // Intentar crear perfil en la tabla 'perfiles' (opcional)
                const { error: profileError } = await supabaseClient
                    .from('perfiles')
                    .upsert([{ id: data.user.id, email: email, nombre: name }]);
                if (profileError) console.warn("Error al crear perfil:", profileError);
            }

            alert("Registro exitoso. Revisa tu correo para confirmar (si activaste la verificación). Ahora puedes iniciar sesión.");
            renderLogin();
        } catch (err) {
            alert("Error en el registro: " + err.message);
        }
    }

    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div class="login-container">
                <i class="fas fa-church" style="font-size: 3rem; color: var(--primary);"></i>
                <h2>Praise Engine FZ® Cloud</h2>
                <div class="form-group">
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPass" class="form-control" placeholder="Contraseña">
                </div>
                <button class="btn btn-primary w-100 mb-2" onclick="login(loginEmail.value, loginPass.value)">Iniciar Sesión</button>
                <button class="btn btn-ghost w-100 mb-2" onclick="renderRegister()">Registrarse</button>
                <div style="text-align: center; margin-top: 10px;">
                    <a href="#" onclick="showResetPassword()" class="text-accent small">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
        `;
        window.showResetPassword = () => {
            const email = prompt("Introduce tu email para restablecer la contraseña:");
            if (email) resetPassword(email);
        };
    }

    function renderApp() {
        document.getElementById('appRoot').innerHTML = `
            <header class="app-header">
                <div class="app-title" id="easterEggTitle"><i class="fas fa-church"></i> Praise Engine FZ® Cloud <small>| I.E.C. Fortaleza</small></div>
                <div class="nav-icons">
                    <div class="nav-item active" data-tab="songs"><i class="fas fa-music"></i><span>CANCIONERO</span></div>
                    <div class="nav-item" data-tab="lists"><i class="fas fa-list-ul"></i><span>MIS LISTAS</span></div>
                    <div class="nav-item" data-tab="resources"><i class="fas fa-tools"></i><span>RECURSOS</span></div>
                    <div class="nav-item admin-tab" data-tab="admin" style="display:${adminVisible ? 'flex' : 'none'}"><i class="fas fa-lock"></i><span>ADMIN</span></div>
                    <div class="user-info"><i class="fas fa-user-circle"></i> ${escapeHtml(currentUser.email)} <button class="btn-icon" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
                    <div class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> <span>Modo Oscuro</span></div>
                </div>
            </header>
            <div class="container">
                <div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" class="search-box" id="globalSearch" placeholder="Buscar..." oninput="renderCurrentView()"></div>
                <div id="viewControls" class="view-controls"></div>
                <div id="actionHeader" style="margin-bottom:1rem;text-align:right"></div>
                <div id="mainContent"></div>
            </div>
        `;
        document.querySelectorAll('.nav-item[data-tab]').forEach(el => el.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active'); currentTab = el.dataset.tab; selectedListId = null; renderCurrentView();
        }));
        const darkToggle = document.getElementById('darkModeToggle');
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('iec_darkmode', document.body.classList.contains('dark'));
            darkToggle.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> Modo Claro' : '<i class="fas fa-moon"></i> Modo Oscuro';
        });
        if (localStorage.getItem('iec_darkmode') === 'true') { document.body.classList.add('dark'); darkToggle.innerHTML = '<i class="fas fa-sun"></i> Modo Claro'; }
        renderCurrentView();
        const titleEl = document.getElementById('easterEggTitle');
        let timer = null;
        titleEl.addEventListener('mousedown', () => timer = setTimeout(() => { adminVisible = true; renderApp(); }, 10000));
        titleEl.addEventListener('mouseup', () => clearTimeout(timer));
        titleEl.addEventListener('touchstart', () => timer = setTimeout(() => { adminVisible = true; renderApp(); }, 10000));
        titleEl.addEventListener('touchend', () => clearTimeout(timer));
    }

    function renderCurrentView() {
        if (currentTab === 'songs') renderSongs();
        else if (currentTab === 'lists') selectedListId ? renderListDetail() : renderLists();
        else if (currentTab === 'resources') renderResources();
        else if (currentTab === 'admin' && adminVisible) renderAdmin();
    }

    // ==================== CANCIONERO ====================
    function renderSongs() {
        const query = document.getElementById('globalSearch')?.value.toLowerCase() || '';
        let filtered = songs.filter(s => s.title.toLowerCase().includes(query) || s.category.toLowerCase().includes(query));
        filtered.sort((a,b)=>a.title.localeCompare(b.title));
        document.getElementById('actionHeader').innerHTML = `<button class="btn btn-primary" onclick="openSongModal()"><i class="fas fa-plus"></i> Nueva Canción</button>`;
        document.getElementById('viewControls').innerHTML = `<button class="btn-view ${viewMode==='table'?'active':''}" id="songsTableView"><i class="fas fa-list"></i> Lista</button><button class="btn-view ${viewMode==='grid'?'active':''}" id="songsGridView"><i class="fas fa-th-large"></i> Cuadrícula</button>`;
        document.getElementById('songsTableView')?.addEventListener('click',()=>{viewMode='table';renderSongs();});
        document.getElementById('songsGridView')?.addEventListener('click',()=>{viewMode='grid';renderSongs();});
        const container = document.getElementById('mainContent');
        if (viewMode === 'table') {
            container.innerHTML = `<div class="list-view-container"><table style="width:100%"><thead><tr><th>Título</th><th>Categoría</th><th>Tono</th><th>BPM</th><th>Acordes</th><th></th></td></thead><tbody>${filtered.map(s => `<tr>
                        <td><b>${escapeHtml(s.title)}</b></td>
                        <td><span class="card-category">${s.category}</span></td>
                        <td>${s.key}</td>
                        <td><button class="btn-icon" onclick="openMetronome('${s.id}'); event.stopPropagation();"><i class="fas fa-drumstick-bite"></i> ${s.bpm||'--'}</button></td>
                        <td><button class="btn-icon" onclick="viewChords('${s.id}'); event.stopPropagation();"><i class="fas fa-file-pdf"></i></button></td>
                        <td><button class="btn-icon" onclick="openSongModal('${s.id}'); event.stopPropagation();"><i class="fas fa-edit"></i></button><button class="btn-icon" onclick="deleteSong('${s.id}'); event.stopPropagation();"><i class="fas fa-trash"></i></button></td>
                    </tr>`).join('')}</tbody>}</div>`;
        } else {
            container.innerHTML = `<div class="grid">${filtered.map(s => `<div class="card"><span class="card-category">${s.category}</span><div class="card-title">${escapeHtml(s.title)}</div><div><i class="fas fa-music"></i> ${s.key} | 🥁 ${s.bpm||'--'} BPM</div><div style="margin-top:0.8rem;display:flex;gap:0.5rem;"><button class="btn btn-ghost" onclick="openSongModal('${s.id}')">Editar</button><button class="btn btn-ghost" onclick="openMetronome('${s.id}')"><i class="fas fa-drumstick-bite"></i> Metrónomo</button><button class="btn btn-ghost" onclick="viewChords('${s.id}')"><i class="fas fa-file-pdf"></i> Acordes</button></div></div>`).join('')}</div>`;
        }
    }

    function openSongModal(id=null) {
        const s = songs.find(s => s.id === id) || { title: '', category: 'Adoración', key: 'C', bpm: 80, chordsUrl: '', chordsData: '', lyrics: '' };
        showModal(`<h3>${id ? 'Editar' : 'Nueva'} Canción</h3>
            <div class="form-group"><label>Título</label><input id="mTitle" class="form-control" value="${escapeHtml(s.title)}"></div>
            <div class="form-group"><label>Categoría</label><select id="mCat" class="form-control"><option ${s.category==='Adoración'?'selected':''}>Adoración</option><option ${s.category==='Exaltación'?'selected':''}>Exaltación</option><option ${s.category==='Júbilo'?'selected':''}>Júbilo</option></select></div>
            <div class="form-group"><label>Tonalidad</label><select id="mKey" class="form-control">${keys.map(k => `<option ${s.key===k?'selected':''}>${k}</option>`).join('')}</select></div>
            <div class="form-group"><label>BPM</label><input id="mBpm" type="number" class="form-control" value="${s.bpm||80}"></div>
            <div class="form-group"><label>Enlace acordes (PDF/imagen)</label><input id="mChordsUrl" class="form-control" value="${escapeHtml(s.chordsUrl)}"></div>
            <div class="form-group"><label>Subir archivo</label><input type="file" id="mChordsFile" accept=".pdf,.jpg,.jpeg,.png" class="form-control"></div>
            <div class="form-group"><label>Letra (Teleprompter)</label><textarea id="mLyrics" rows="3" class="form-control">${escapeHtml(s.lyrics)}</textarea></div>
            <div style="text-align:right"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveSongFromModal('${id}')">Guardar</button></div>`);
    }
    async function saveSongFromModal(id) {
        const title = document.getElementById('mTitle').value.trim();
        if (!title) return alert("Título requerido");
        const file = document.getElementById('mChordsFile').files[0];
        let chordsData = '';
        if (file) {
            const reader = new FileReader();
            await new Promise(resolve => { reader.onload = e => { chordsData = e.target.result; resolve(); }; reader.readAsDataURL(file); });
        }
        const song = {
            id: id || Date.now().toString(),
            title, category: document.getElementById('mCat').value, key: document.getElementById('mKey').value, bpm: parseInt(document.getElementById('mBpm').value) || 80,
            chordsUrl: document.getElementById('mChordsUrl').value.trim(), chordsData: chordsData || (id ? songs.find(s=>s.id===id)?.chordsData : ''),
            lyrics: document.getElementById('mLyrics').value, youtube: ''
        };
        await saveSong(song);
        closeModal();
    }
    async function deleteSong(id) { if (confirm("¿Eliminar canción?")) await deleteSong(id); }

    // ==================== LISTAS ====================
    function renderLists() {
        const query = document.getElementById('globalSearch')?.value.toLowerCase() || '';
        let filtered = lists.filter(l => l.name.toLowerCase().includes(query));
        document.getElementById('actionHeader').innerHTML = `<button class="btn btn-primary" onclick="openCreateListModal()"><i class="fas fa-folder-plus"></i> Crear Lista</button><button class="btn btn-ghost" onclick="exportAllListsToExcel()"><i class="fas fa-file-excel"></i> Exportar Todas</button>`;
        document.getElementById('viewControls').innerHTML = `<button class="btn-view ${listsViewMode==='grid'?'active':''}" id="listsGridBtn"><i class="fas fa-th-large"></i> Cuadrícula</button><button class="btn-view ${listsViewMode==='table'?'active':''}" id="listsTableBtn"><i class="fas fa-list"></i> Tabla</button>`;
        document.getElementById('listsGridBtn')?.addEventListener('click',()=>{listsViewMode='grid';renderLists();});
        document.getElementById('listsTableBtn')?.addEventListener('click',()=>{listsViewMode='table';renderLists();});
        const container = document.getElementById('mainContent');
        if (listsViewMode === 'grid') {
            container.innerHTML = `<div class="grid">${filtered.map(l => `<div class="card" onclick="selectedListId='${l.id}'; renderCurrentView()"><span class="card-category">Lista</span><div class="card-title">${escapeHtml(l.name)}</div><div>📅 ${l.date || 'Sin fecha'}</div><div>🎵 ${l.items.length} canciones</div><div onclick="event.stopPropagation()"><button class="btn-icon" onclick="editListName('${l.id}')"><i class="fas fa-edit"></i></button><button class="btn-icon" onclick="deleteList('${l.id}')"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;
        } else {
            container.innerHTML = `<div class="list-view-container"><table style="width:100%"><thead><tr><th>Nombre</th><th>Fecha</th><th>Canciones</th><th></th></tr></thead><tbody>${filtered.map(l => `<tr onclick="selectedListId='${l.id}'; renderCurrentView()"><td>${escapeHtml(l.name)}</td><td>${l.date || '—'}</td><td>${l.items.length}</td><td><button class="btn-icon" onclick="editListName('${l.id}'); event.stopPropagation()"><i class="fas fa-pen"></i></button><button class="btn-icon" onclick="deleteList('${l.id}'); event.stopPropagation()"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody>}</div>`;
        }
    }

    function openCreateListModal() {

    function openTuner() {
        showModal(`<div class="tuner-container"><h3>Afinador</h3><div class="tuner-note" id="tunerNote">--</div><div class="tuner-meter"><div class="tuner-needle" id="tunerNeedle"></div></div><p>Reproduce una nota en tu guitarra/bajo</p><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
        const noteElem = document.getElementById('tunerNote');
        const needleElem = document.getElementById('tunerNeedle');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { noteElem.innerText = "Sin acceso a micrófono"; return; }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);
            const detectPitch = () => {
                analyser.getFloatTimeDomainData(dataArray);
                let maxSample = 0;
                for (let i=0; i<bufferLength; i++) if (Math.abs(dataArray[i]) > maxSample) maxSample = Math.abs(dataArray[i]);
                if (maxSample < 0.01) { requestAnimationFrame(detectPitch); return; }
                let rms = 0;
                for (let i=0; i<bufferLength; i++) rms += dataArray[i]*dataArray[i];
                rms = Math.sqrt(rms/bufferLength);
                if (rms < 0.01) { requestAnimationFrame(detectPitch); return; }
                let autocorr = new Array(bufferLength);
                for (let lag=0; lag<bufferLength; lag++) {
                    let sum=0;
                    for (let i=0; i<bufferLength-lag; i++) sum += dataArray[i]*dataArray[i+lag];
                    autocorr[lag]=sum;
                }
                let maxVal=-1, maxLag=0;
                for (let lag=20; lag<bufferLength/2; lag++) if (autocorr[lag] > maxVal) { maxVal=autocorr[lag]; maxLag=lag; }
                let freq = audioCtx.sampleRate / maxLag;
                const noteNames = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
                let noteNum = 12 * Math.log2(freq / 440) + 69;
                let roundedNote = Math.round(noteNum);
                let cents = Math.round((noteNum - roundedNote) * 100);
                let note = noteNames[roundedNote % 12];
                let octave = Math.floor(roundedNote / 12) - 1;
                if (freq > 70 && freq < 500) {
                    noteElem.innerText = `${note}${octave} (${cents>0?'+':''}${cents}¢)`;
                    let percent = Math.min(100, Math.max(0, 50 + (cents/50)*50));
                    needleElem.style.width = `${percent}%`;
                    needleElem.style.background = Math.abs(cents) < 5 ? "#10B981" : "#F59E0B";
                } else { noteElem.innerText = "--"; needleElem.style.width = "0%"; }
                requestAnimationFrame(detectPitch);
            };
            detectPitch();
        }).catch(() => { noteElem.innerText = "Permiso denegado"; });
    }

    function openModulesLibrary() {
        let html = `<h3>Centro de Capacitación</h3><div class="grid">`;
        modules.forEach(mod => { html += `<div class="card" onclick="startModule('${mod.id}')"><div class="card-category">Módulo</div><h4>${escapeHtml(mod.title)}</h4><p>Evaluación al final</p></div>`; });

        showModal(html);
        window.startModule = (moduleId) => {
            const mod = modules.find(m => m.id === moduleId);
            if (!mod) return;
            let currentQ = 0, score = 0, timer = null;
            const showQuestion = () => {
                if (currentQ >= mod.questions.length) {
                    if (timer) clearInterval(timer);
                    alert(`✅ Evaluación finalizada. Puntaje: ${score}/${mod.questions.length}`);
                    closeModal();
                    return;
                }
                const q = mod.questions[currentQ];
                let timeLeft = q.time;
                showModal(`<h3>${escapeHtml(mod.title)} - Pregunta ${currentQ+1}/${mod.questions.length}</h3><p>${escapeHtml(q.text)}</p>${q.options.map((opt, idx) => `<button class="btn btn-ghost" style="display:block; width:100%; margin:0.5rem 0;" onclick="answerQuestion(${idx})">${escapeHtml(opt)}</button>`).join('')}<div class="question-timer" id="timerDisplay">⏱️ ${timeLeft} seg</div><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>`);
                const timerDisplay = document.getElementById('timerDisplay');
                timer = setInterval(() => { timeLeft--; if (timerDisplay) timerDisplay.innerText = `⏱️ ${timeLeft} seg`; if (timeLeft <= 0) { clearInterval(timer); alert("Tiempo agotado"); currentQ++; showQuestion(); } }, 1000);
                window.answerQuestion = (selectedIdx) => { clearInterval(timer); if (selectedIdx === q.correct) score++; currentQ++; showQuestion(); };
            };
            showQuestion();
        };
    }

    function openMetronome(songId) {
        const song = songs.find(s => s.id === songId);
        if (!song) return;
        const bpm = song.bpm || 80;
        const intervalMs = 60000 / bpm;
        if (metronomeInterval) clearInterval(metronomeInterval);
        showModal(`<div class="metronome-container" style="text-align:center"><h3>Metrónomo: ${escapeHtml(song.title)}</h3><div class="metronome-led" id="metroLed"></div><p>${bpm} BPM</p><button class="btn btn-primary" id="startMetroBtn">Iniciar</button><button class="btn btn-ghost" id="stopMetroBtn">Detener</button><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
        const led = document.getElementById('metroLed');
        const startBtn = document.getElementById('startMetroBtn');
        const stopBtn = document.getElementById('stopMetroBtn');
        let isRunning = false;
        const tick = () => { led.classList.add('active'); if (navigator.vibrate) navigator.vibrate(50); setTimeout(() => led.classList.remove('active'), 100); };
        startBtn.onclick = () => { if (!isRunning) { isRunning = true; tick(); metronomeInterval = setInterval(() => { if (isRunning) tick(); }, intervalMs); } };
        stopBtn.onclick = () => { if (metronomeInterval) clearInterval(metronomeInterval); isRunning = false; };
    }

    function viewChords(songId) {
        const song = songs.find(s => s.id === songId);
        if (!song) return;
        let content = '';
        if (song.chordsData) {
            const blob = dataURLtoBlob(song.chordsData);
            const url = URL.createObjectURL(blob);
            content = `<iframe src="${url}" style="width:100%; height:400px; border:none"></iframe><br><a href="${url}" download="acordes_${song.id}.pdf" class="btn btn-primary">Descargar archivo</a>`;
        } else if (song.chordsUrl) {
            content = `<iframe src="${song.chordsUrl}" style="width:100%; height:400px; border:none"></iframe><br><a href="${song.chordsUrl}" target="_blank" class="btn btn-primary">Abrir enlace</a>`;
        } else {
            content = `<p>No hay acordes cargados. Puedes editarla y agregar un enlace o subir un archivo.</p>`;
        }
        showModal(`<h3>Acordes / PDF: ${escapeHtml(song.title)}</h3>${content}<div style="margin-top:1rem"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
    }
    function dataURLtoBlob(dataURL) {
        const arr = dataURL.split(','); const mime = arr[0].match(/:(.*?);/)[1]; const bstr = atob(arr[1]); let n = bstr.length; const u8arr = new Uint8Array(n); while (n--) u8arr[n] = bstr.charCodeAt(n); return new Blob([u8arr], {type: mime});
    }

    function printList(listId) {
        const list = lists.find(l => l.id === listId);
        if (!list || list.items.length === 0) return alert("La lista está vacía");
        const copias = 12;
        const win = window.open();
        win.document.write(`
            <html><head><title>${escapeHtml(list.name)}</title><style>body{font-family:sans-serif;margin:0.2cm}.print-area{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.print-card{border:1px solid #000;border-radius:8px;padding:6px;break-inside:avoid}.print-title{font-weight:bold;text-align:center;border-bottom:1px solid #aaa;margin-bottom:4px}.print-song{font-size:8pt;margin:2px 0}.print-footer{font-size:6pt;text-align:center;margin-top:4px}</style></head><body><div class="print-area">
        `);
        for (let i = 0; i < copias; i++) {
            win.document.write(`<div class="print-card"><div class="print-title">${escapeHtml(list.name)}</div>`);
            list.items.forEach(item => {
                const s = songs.find(s => s.id === item.songId);
                if (s) win.document.write(`<div class="print-song">🎵 ${escapeHtml(s.title)} (${item.keyOverride || s.key})</div>`);
            });
            win.document.write(`<div class="print-footer">Praise Engine FZ® Cloud | I.E.C. Fortaleza</div></div>`);
        }
        win.document.write('</div></body></html>');
        win.document.close();
        win.print();
    }

    function exportListToExcel(listId) {
        const list = lists.find(l => l.id === listId);
        const data = [["Canción", "Tonalidad"]];
        list.items.forEach(item => {
            const s = songs.find(s => s.id === item.songId);
            if (s) data.push([s.title, item.keyOverride || s.key]);
        });
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, list.name.slice(0,31));
        XLSX.writeFile(wb, `${list.name.replace(/[^a-z0-9]/gi,'_')}.xlsx`);
    }

    function shareListWhatsApp(listId) {
        const list = lists.find(l => l.id === listId);
        if (!list || list.items.length===0) return alert("Lista vacía");
        let message = `🎵 *${list.name}* 🎵\n`;
        list.items.forEach((item, i) => {
            const song = songs.find(s => s.id === item.songId);
            if (song) message += `${i+1}. ${song.title} (${item.keyOverride || song.key})\n`;
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    }

    // ==================== INICIALIZACIÓN ====================
    (async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) { currentUser = session.user; await loadUserData(); renderApp(); }
        else renderLogin();
    })();
</script>
