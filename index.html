<script>
    // ==================== CONFIGURACIÓN SUPABASE ====================
    const SUPABASE_URL = 'https://mudcrmgaqejmpyeyocmt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZGNybWdhcWVqbXB5ZXlvY210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTg2MzUsImV4cCI6MjA5NDM3NDYzNX0.Izf3hp-JHgkWH00kEpSMitSo61pMtGeQh-6PimhcNIU';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let songs = [], lists = [], team = [], attendance = [], shifts = [], modules = [];
    let currentTab = 'songs', selectedListId = null, viewMode = 'table', listsViewMode = 'grid';

    const keys = ["C","Cm","C#","C#m","D","Dm","D#","D#m","E","Em","F","Fm","F#","F#m","G","Gm","G#","G#m","A","Am","A#","A#m","B","Bm"];
    let tableColumns = { canciones: [], listas: [], lista_items: [], equipo: [], asistencia: [], turnos: [], modulos: [] };

    // Mapeo de notas para transposición
    const noteMap = { 'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11 };
    const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    
    function transposeChord(chord, semitones) {
        const match = chord.match(/^([A-G][#b]?)(.*)$/);
        if (!match) return chord;
        let base = match[1], suffix = match[2];
        let idx = noteMap[base];
        if (idx === undefined) return chord;
        let newIdx = (idx + semitones + 12) % 12;
        return noteNames[newIdx] + suffix;
    }
    
    function transposeLyrics(text, fromKey, toKey) {
        if (!text || !fromKey || !toKey || fromKey === toKey) return text;
        const fromBase = fromKey.replace(/m$/, ''), toBase = toKey.replace(/m$/, '');
        let semitones = (noteMap[toBase] - noteMap[fromBase] + 12) % 12;
        if (fromKey.endsWith('m')) semitones = (semitones + 12) % 12;
        if (toKey.endsWith('m') && !fromKey.endsWith('m')) semitones = (semitones + 12) % 12;
        return text.replace(/\[([A-G][#b]?[^\]]*)\]/g, (match, chord) => `[${transposeChord(chord, semitones)}]`);
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function closeModal() { document.getElementById('modal')?.remove(); if(metronomeInterval) { clearInterval(metronomeInterval); metronomeInterval = null; } }
    function showModal(content) { closeModal(); const div = document.createElement('div'); div.id = 'modal'; div.className = 'modal'; div.style.display = 'flex'; div.innerHTML = `<div class="modal-content">${content}</div>`; document.body.appendChild(div); }

    // Detección automática inteligente del esquema SQL cargado
    async function discoverSchemas() {
        for (let table of Object.keys(tableColumns)) {
            try {
                const { data } = await supabaseClient.from(table).select('*').limit(1);
                if (data && data.length > 0) {
                    tableColumns[table] = Object.keys(data[0]);
                } else {
                    const defaults = {
                        canciones: ['id', 'user_id', 'title', 'category', 'key', 'bpm', 'chordsUrl', 'chordsData', 'lyrics', 'youtube', 'titulo', 'categoria', 'tono', 'letra'],
                        listas: ['id', 'user_id', 'name', 'date', 'nombre', 'fecha'],
                        lista_items: ['lista_id', 'song_id', 'key_override', 'orden', 'cancion_id', 'tonalidad_recambio'],
                        equipo: ['id', 'user_id', 'name', 'role', 'nombre', 'rol'],
                        asistencia: ['id', 'user_id', 'date', 'member_id', 'status', 'fecha', 'miembro_id', 'estado'],
                        turnos: ['id', 'user_id', 'date', 'member_id', 'fecha', 'miembro_id'],
                        modulos: ['id', 'user_id', 'title', 'content', 'questions']
                    };
                    tableColumns[table] = defaults[table];
                }
            } catch (e) { console.error("Error al mapear tabla " + table, e); }
        }
    }

    function buildPayload(table, uiObj) {
        const columns = tableColumns[table];
        if (!columns || columns.length === 0) return uiObj;
        const payload = {};
        const mappings = {
            id: ['id'], user_id: ['user_id', 'userId'], title: ['title', 'titulo', 'título'],
            category: ['category', 'categoria', 'categoría'], key: ['key', 'tono', 'tonalidad'], bpm: ['bpm'],
            chordsUrl: ['chords_url', 'chordsUrl'], chordsData: ['chords_data', 'chordsData'], lyrics: ['lyrics', 'letra'],
            youtube: ['youtube'], name: ['name', 'nombre'], date: ['date', 'fecha'],
            songId: ['song_id', 'songId', 'cancion_id', 'cancionId'],
            keyOverride: ['key_override', 'keyOverride', 'tonalidad_recambio', 'tono_personalizado'],
            orden: ['orden', 'order'], role: ['role', 'rol'],
            memberId: ['member_id', 'memberId', 'miembro_id', 'miembroId'], status: ['status', 'estado']
        };
        columns.forEach(col => {
            for (let uiKey in uiObj) {
                const possibleCols = mappings[uiKey];
                if ((possibleCols && possibleCols.includes(col)) || uiKey.toLowerCase() === col.toLowerCase() || uiKey.replace(/_/g, '').toLowerCase() === col.replace(/_/g, '').toLowerCase()) {
                    payload[col] = uiObj[uiKey];
                    return;
                }
            }
        });
        if (columns.includes('user_id') && uiObj.user_id) payload['user_id'] = uiObj.user_id;
        if (columns.includes('id') && uiObj.id) payload['id'] = uiObj.id;
        return payload;
    }

    function normalizeRow(table, dbObj) {
        if (!dbObj) return dbObj;
        const uiObj = { ...dbObj };
        const propertyMappings = {
            title: ['title', 'titulo', 'título'], category: ['category', 'categoria', 'categoría'],
            key: ['key', 'tono', 'tonalidad'], chordsUrl: ['chords_url', 'chordsUrl'],
            chordsData: ['chords_data', 'chordsData'], lyrics: ['lyrics', 'letra'],
            name: ['name', 'nombre'], date: ['date', 'fecha'],
            songId: ['song_id', 'songId', 'cancion_id', 'cancionId'],
            keyOverride: ['key_override', 'keyOverride', 'tonalidad_recambio', 'tono_personalizado'],
            orden: ['orden', 'order'], role: ['role', 'rol'],
            memberId: ['member_id', 'memberId', 'miembro_id', 'miembroId'], status: ['status', 'estado']
        };
        for (let uiKey in propertyMappings) {
            for (let dbKey of propertyMappings[uiKey]) {
                if (dbObj[dbKey] !== undefined) { uiObj[uiKey] = dbObj[dbKey]; break; }
            }
        }
        return uiObj;
    }

    // ==================== AUTENTICACIÓN ====================
    async function login(email, password) {
        try {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            await loadUserData();
            renderApp();
        } catch (err) { alert("Error al iniciar sesión: " + err.message); }
    }
    async function resetPassword(email) {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
        if (error) alert("Error: " + error.message);
        else alert("Se ha enviado un enlace para restablecer tu contraseña a tu correo.");
    }

    async function logout() {
    try {
        // Esperamos a que Supabase cierre la sesión completamente en el servidor y localmente
        const { error } = await supabase.auth.signOut();
        if (error) throw error;
        
        // Limpiamos por completo el almacenamiento local por seguridad
        localStorage.clear();
        sessionStorage.clear();
        
        // Forzamos la recarga limpia de la página
        window.location.href = window.location.origin + window.location.pathname;
    } catch (error) {
        console.error('Error al cerrar sesión:', error.message);
        alert('No se pudo cerrar la sesión: ' + error.message);
    }
}
    
    function renderRegister() {
        document.getElementById('appRoot').innerHTML = `
            <div class="login-container">

    async function registerUser() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const confirm = document.getElementById('regConfirmPass').value;
        if (!name || !email || !password) { alert("Completa todos los campos"); return; }
        if (password !== confirm) { alert("Las contraseñas no coinciden"); return; }
        try {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user) {
                await supabaseClient.from('perfiles').upsert([{ id: data.user.id, email: email, nombre: name }]);
                alert("Registro exitoso. Revisa tu correo para confirmar. Ahora puedes iniciar sesión.");
                renderLogin();
            }
        } catch (err) {
            if (err.message.includes("User already registered")) alert("Este correo ya está registrado.");
            else alert("Error en el registro: " + err.message);
        }
    }

    // ==================== CARGA DE DATOS Y CRUD CORREGIDOS ====================
    async function loadUserData() {
        if (!currentUser) return;
        await discoverSchemas();

        const { data: s } = await supabaseClient.from('canciones').select('*').eq('user_id', currentUser.id);
        songs = (s || []).map(x => normalizeRow('canciones', x));
        
        const { data: l } = await supabaseClient.from('listas').select('*').eq('user_id', currentUser.id);
        lists = (l || []).map(x => normalizeRow('listas', x));
        
        for (let list of lists) {
            const { data: items } = await supabaseClient.from('lista_items').select('*').eq('lista_id', list.id).order('orden');
            list.items = (items || []).map(x => normalizeRow('lista_items', x));
        }
        
        const { data: t } = await supabaseClient.from('equipo').select('*').eq('user_id', currentUser.id);
        team = (t || []).map(x => normalizeRow('equipo', x));
        
        const { data: a } = await supabaseClient.from('asistencia').select('*').eq('user_id', currentUser.id);
        attendance = (a || []).map(x => normalizeRow('asistencia', x));
        
        const { data: sh } = await supabaseClient.from('turnos').select('*').eq('user_id', currentUser.id);
        shifts = (sh || []).map(x => normalizeRow('turnos', x));
        
        const { data: m } = await supabaseClient.from('modulos').select('*').eq('user_id', currentUser.id);
        modules = m || [];
        
        if (modules.length === 0) {
            const defaultModules = [
                { id: 'mod1', title: 'Teología de la Adoración', content: '<p>La adoración es respuesta a la revelación de Dios...</p>', questions: [{ text: '¿Qué es la adoración?', options: ['Un estilo musical', 'Respuesta a Dios', 'Un ritual'], correct: 1, time: 20 }] },
                { id: 'mod2', title: 'Liderazgo Servicial', content: '<p>El líder sirve como Jesús...</p>', questions: [{ text: '¿Cuál es la base del liderazgo cristiano?', options: ['Autoridad', 'Servicio', 'Carisma'], correct: 1, time: 20 }] }
            ];
            for (let mod of defaultModules) {
                const modPayload = buildPayload('modulos', { id: mod.id, user_id: currentUser.id, title: mod.title, content: mod.content, questions: mod.questions });
                await supabaseClient.from('modulos').upsert(modPayload, { onConflict: 'id' });
            }
            const { data: newM } = await supabaseClient.from('modulos').select('*').eq('user_id', currentUser.id);
            modules = newM || [];
        }
    }

    async function saveSong(song) {
        try {
            const exists = songs.some(s => s.id === song.id);
            const payload = buildPayload('canciones', song);
            if (exists) {
                await supabaseClient.from('canciones').update(payload).eq('id', song.id);
            } else {
                await supabaseClient.from('canciones').insert(payload);
            }
            await loadUserData();
            renderCurrentView();
            return true;
        } catch (err) {
            console.error("Error guardando canción:", err);
            alert("Error al guardar: " + err.message);
            return false;
        }
    }
    
    async function deleteSong(id) { await supabaseClient.from('canciones').delete().eq('id', id); await loadUserData(); renderCurrentView(); }
    
    async function saveList(list) {
        try {
            const exists = lists.some(l => l.id === list.id);
            const listId = list.id || Date.now().toString();
            const listPayload = buildPayload('listas', { id: listId, user_id: currentUser.id, name: list.name, date: list.date });
            
            if (exists) {
                await supabaseClient.from('listas').update(listPayload).eq('id', listId);
                await supabaseClient.from('lista_items').delete().eq('lista_id', listId);
            } else {
                await supabaseClient.from('listas').insert(listPayload);
            }
            
            for (let i = 0; i < list.items.length; i++) {
                const item = list.items[i];
                const itemPayload = buildPayload('lista_items', {
                    lista_id: listId,
                    songId: item.songId || item.song_id,
                    keyOverride: item.keyOverride || item.key_override || null,
                    orden: i
                });
                if (tableColumns['lista_items'].includes('user_id')) itemPayload['user_id'] = currentUser.id;
                await supabaseClient.from('lista_items').insert(itemPayload);
            }
            await loadUserData(); 
            renderCurrentView();
        } catch (e) { alert("Error al guardar lista: " + e.message); }
    }
    
    async function deleteList(id) { await supabaseClient.from('listas').delete().eq('id', id); if (selectedListId === id) selectedListId = null; await loadUserData(); renderCurrentView(); }
    
    async function saveTeam(members) {
        try {
            team = members;
            await supabaseClient.from('equipo').delete().eq('user_id', currentUser.id);
            for (let m of team) {
                const memberPayload = buildPayload('equipo', { id: m.id || Date.now().toString(), user_id: currentUser.id, name: m.name, role: m.role });
                await supabaseClient.from('equipo').insert(memberPayload);
            }
            await loadUserData(); 
            renderCurrentView();
        } catch (e) { alert("Error al guardar equipo: " + e.message); }
    }
    
    async function saveAttendance(reg) {
        try {
            attendance = reg;
            await supabaseClient.from('asistencia').delete().eq('user_id', currentUser.id);
            for (let a of attendance) {
                const payload = buildPayload('asistencia', { id: a.id || Date.now(), user_id: currentUser.id, date: a.date, memberId: a.memberId || a.member_id, status: a.status });
                await supabaseClient.from('asistencia').insert(payload);
            }
        } catch (e) { console.error(e); }
    }
    
    async function saveShifts(sh) {
        try {
            shifts = sh;
            await supabaseClient.from('turnos').delete().eq('user_id', currentUser.id);
            for (let s of shifts) {
                const payload = buildPayload('turnos', { id: s.id || Date.now(), user_id: currentUser.id, date: s.date, memberId: s.memberId || s.member_id });
                await supabaseClient.from('turnos').insert(payload);
            }
        } catch (e) { console.error(e); }
    }

    function openSongModal(id = null) {
        const s = songs.find(x => x.id === id) || { title: '', category: 'Adoración', key: 'C', bpm: 80, chordsUrl: '', chordsData: '', lyrics: '' };
        const idArg = id ? `'${id}'` : 'null';
        showModal(`<h3>${id ? 'Editar' : 'Nueva'} Canción</h3>
            <div class="form-group"><label>Título</label><input id="mTitle" class="form-control" value="${escapeHtml(s.title)}"></div>
            <div class="form-group"><label>Categoría</label><select id="mCat" class="form-control"><option ${s.category==='Adoración'?'selected':''}>Adoración</option><option ${s.category==='Exaltación'?'selected':''}>Exaltación</option><option ${s.category==='Júbilo'?'selected':''}>Júbilo</option></select></div>
            <div class="form-group"><label>Tonalidad</label><select id="mKey" class="form-control">${keys.map(k => `<option ${s.key===k?'selected':''}>${k}</option>`).join('')}</select></div>
            <div class="form-group"><label>BPM</label><input id="mBpm" type="number" class="form-control" value="${s.bpm||80}"></div>
            <div class="form-group"><label>Enlace acordes (PDF/imagen)</label><input id="mChordsUrl" class="form-control" value="${escapeHtml(s.chordsUrl)}"></div>
            <div class="form-group"><label>Subir archivo</label><input type="file" id="mChordsFile" accept=".pdf,.jpg,.jpeg,.png" class="form-control"></div>
            <div class="form-group"><label>Letra (Teleprompter y editor)</label><textarea id="mLyrics" rows="5" class="form-control">${escapeHtml(s.lyrics)}</textarea></div>
            <div style="text-align:right"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveSongFromModal(${idArg})">Guardar</button></div>`);
    }
    
    async function saveSongFromModal(id) {
        const cleanId = (id && id !== 'null' && id !== 'undefined') ? id : null;
        const title = document.getElementById('mTitle').value.trim();
        if (!title) return alert("Título requerido");
        const file = document.getElementById('mChordsFile').files[0];
        let chordsData = '';
        if (file) {
            const reader = new FileReader();
            await new Promise(resolve => { reader.onload = e => { chordsData = e.target.result; resolve(); }; reader.readAsDataURL(file); });
        }
        const song = {
            id: cleanId || Date.now().toString(),
            user_id: currentUser.id,
            title, category: document.getElementById('mCat').value, key: document.getElementById('mKey').value,
            bpm: parseInt(document.getElementById('mBpm').value) || 80,
            chordsUrl: document.getElementById('mChordsUrl').value.trim(),
            chordsData: chordsData || (cleanId ? songs.find(s=>s.id===cleanId)?.chordsData : ''),
            lyrics: document.getElementById('mLyrics').value, youtube: ''
        };
        await saveSong(song);
        closeModal();
    }

    async function openLyricsEditor(songId) {
        const song = songs.find(s => s.id === songId);
        if (!song) return;
        showModal(`
            <h3>Editar Letra y Acordes: ${escapeHtml(song.title)}</h3>
            <div style="display:flex; gap:1rem; margin-bottom:1rem; align-items:center; flex-wrap:wrap;">
                <label>Tonalidad actual:</label>
                <select id="transposeFromKey" class="form-control" style="width:100px;">${keys.map(k => `<option ${song.key===k?'selected':''}>${k}</option>`).join('')}</select>
                <label>Transponer a:</label>
                <select id="transposeToKey" class="form-control" style="width:100px;">${keys.map(k => `<option>${k}</option>`).join('')}</select>
                <button class="btn btn-primary" onclick="applyTranspose()">Transponer</button>
            </div>
            <div class="form-group"><label>Letra (usa [Acorde] antes de la sílaba)</label><textarea id="lyricsEditor" rows="12" class="form-control" style="font-family: monospace;">${escapeHtml(song.lyrics || '')}</textarea></div>
            <div style="text-align:right"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveLyrics('${song.id}')">Guardar Letra</button></div>
        `);
        window.applyTranspose = () => {
            const fromKey = document.getElementById('transposeFromKey').value;
            const toKey = document.getElementById('transposeToKey').value;
            const textarea = document.getElementById('lyricsEditor');
            textarea.value = transposeLyrics(textarea.value, fromKey, toKey);
            document.getElementById('transposeFromKey').value = toKey;
        };
        window.saveLyrics = async (id) => {
            const songToUpdate = songs.find(s => s.id === id);
            if (songToUpdate) {
                songToUpdate.lyrics = document.getElementById('lyricsEditor').value;
                await saveSong(songToUpdate);
            }
            closeModal();
        };
    }

        if (newName) { list.name = newName; await saveList(list); }

    function renderListDetail() {
        const list = lists.find(l => l.id === selectedListId);
        if (!list) { selectedListId = null; renderLists(); return; }
        document.getElementById('actionHeader').innerHTML = `<button class="btn btn-ghost" onclick="selectedListId=null; renderCurrentView()"><i class="fas fa-arrow-left"></i> Volver</button><button class="btn btn-primary" onclick="openAddSongToListModal()"><i class="fas fa-plus"></i> Añadir Canción</button><button class="btn btn-ghost" onclick="printList('${list.id}')"><i class="fas fa-print"></i> Imprimir (12 copias)</button><button class="btn btn-ghost" onclick="shareListWhatsApp('${list.id}')"><i class="fab fa-whatsapp"></i> WhatsApp</button><button class="btn btn-ghost" onclick="exportListToExcel('${list.id}')"><i class="fas fa-file-excel"></i> Excel</button>`;
        document.getElementById('viewControls').innerHTML = '';
        const container = document.getElementById('mainContent');
        container.innerHTML = `<div class="card" style="margin-bottom:1rem"><h2>${escapeHtml(list.name)}</h2><p>${list.date || ''} • ${(list.items || []).length} canciones</p></div><div id="dragArea"></div>`;
        const dragArea = document.getElementById('dragArea');
        dragArea.innerHTML = (list.items || []).map((item, idx) => {
            const currentSongId = item.songId || item.song_id;
            const song = songs.find(s => s.id === currentSongId);
            if (!song) return '';
            const keyDisplay = item.keyOverride || item.key_override || song.key;
            return `<div class="card" data-idx="${idx}" style="display:flex; align-items:center; gap:0.8rem; margin-bottom:0.5rem; cursor:grab;"><i class="fas fa-grip-vertical drag-handle"></i><div style="flex:1"><b>${escapeHtml(song.title)}</b> <span class="card-category">${song.category}</span><div>Tono: <b>${keyDisplay}</b> | 🥁 ${song.bpm||'--'} BPM</div></div><button class="btn-icon" onclick="openMetronome('${song.id}'); event.stopPropagation();"><i class="fas fa-drumstick-bite"></i></button><button class="btn-icon" onclick="viewChords('${song.id}'); event.stopPropagation();"><i class="fas fa-file-pdf"></i></button><button class="btn-icon" onclick="openLyricsEditor('${song.id}'); event.stopPropagation();"><i class="fas fa-music"></i></button><button class="btn-icon" onclick="changeItemKey('${list.id}',${idx})"><i class="fas fa-sliders-h"></i></button><button class="btn-icon" onclick="removeSongFromList('${list.id}',${idx})"><i class="fas fa-times"></i></button></div>`;
        }).join('');
        if (sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(dragArea, { handle: '.drag-handle', animation: 200, onEnd: () => { const newOrder = Array.from(document.querySelectorAll('#dragArea .card')).map(el => list.items[parseInt(el.dataset.idx)]); list.items = newOrder; saveList(list); } });
    }

    function openAddSongToListModal() {
        const list = lists.find(l => l.id === selectedListId);
        if (!list) return;
        showModal(`<h3>Añadir canción a "${escapeHtml(list.name)}"</h3><input type="text" id="searchSongAdd" class="form-control" placeholder="Buscar..." style="margin-bottom:1rem"><div id="songsAddList" style="max-height:300px;overflow-y:auto"></div><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>`);
        const renderList = () => {
            const q = document.getElementById('searchSongAdd')?.value.toLowerCase() || '';
            const filtered = songs.filter(s => s.title.toLowerCase().includes(q));
            document.getElementById('songsAddList').innerHTML = filtered.map(s => `<div class="card" style="margin-bottom:0.5rem; cursor:pointer" onclick="addSongToList('${list.id}','${s.id}'); closeModal();"><b>${escapeHtml(s.title)}</b> <span class="card-category">${s.category}</span> <span style="float:right"><b>${s.key}</b></span></div>`).join('');
        };
        renderList();
        document.getElementById('searchSongAdd')?.addEventListener('input', renderList);
    }
    async function addSongToList(listId, songId) {
        const list = lists.find(l => l.id === listId);
        if (!list.items) list.items = [];
        if (list.items.some(item => (item.songId || item.song_id) === songId)) return alert("Ya está en la lista");
        list.items.push({ songId: songId });
        await saveList(list);

    function openTuner() {
        showModal(`<div class="tuner-container"><h3>Afinador Instrumental</h3><div class="tuner-note" id="tunerNote">--</div><div class="tuner-meter"><div class="tuner-needle" id="tunerNeedle"></div></div><p>Toca una cuerda cerca del micrófono</p><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
        const noteElem = document.getElementById('tunerNote');
        const needleElem = document.getElementById('tunerNeedle');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { noteElem.innerText = "Sin soporte de micrófono"; return; }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; source.connect(analyser);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);
            const detectPitch = () => {
                if(!document.getElementById('tunerNote')) return;
                analyser.getFloatTimeDomainData(dataArray);
                let maxSample = 0;
                for (let i=0; i<bufferLength; i++) if (Math.abs(dataArray[i]) > maxSample) maxSample = Math.abs(dataArray[i]);
                if (maxSample < 0.01) { requestAnimationFrame(detectPitch); return; }
                let autocorr = new Array(bufferLength);
                for (let lag=0; lag<bufferLength; lag++) {
                    let sum=0;
                    for (let i=0; i<bufferLength-lag; i++) sum += dataArray[i]*dataArray[i+lag];
                    autocorr[lag]=sum;
                }
                let maxVal=-1, maxLag=0;
                for (let lag=20; lag<bufferLength/2; lag++) if (autocorr[lag] > maxVal) { maxVal=autocorr[lag]; maxLag=lag; }
                let freq = audioCtx.sampleRate / maxLag;
                let noteNum = 12 * Math.log2(freq / 440) + 69;
                let roundedNote = Math.round(noteNum);
                let cents = Math.round((noteNum - roundedNote) * 100);
                let note = noteNames[roundedNote % 12];
                let octave = Math.floor(roundedNote / 12) - 1;
                if (freq > 50 && freq < 600) {
                    noteElem.innerText = `${note}${octave} (${cents>0?'+':''}${cents}¢)`;
                    let percent = Math.min(100, Math.max(0, 50 + (cents/50)*50));
                    needleElem.style.width = `${percent}%`;
                    needleElem.style.background = Math.abs(cents) < 5 ? "#10B981" : "#F59E0B";
                }
                requestAnimationFrame(detectPitch);
            };
            detectPitch();
        }).catch(() => { if(noteElem) noteElem.innerText = "Permiso denegado"; });
    }

    // ==================== METRÓNOMO CON TAP TEMPO AVANZADO ====================
    function openMetronome(songId) {
        const song = songs.find(s => s.id === songId);
        if (!song) return;
        let bpm = song.bpm || 80;
        if (metronomeInterval) clearInterval(metronomeInterval);
        
        showModal(`<div class="metronome-container" style="text-align:center">
            <h3>Metrónomo Digital</h3>
            <h4>${escapeHtml(song.title)}</h4>
            <div class="metronome-led" id="metroLed"></div>
            <p style="font-size:2rem; font-weight:800; margin:0.5rem 0;"><span id="metroBpmDisplay">${bpm}</span> BPM</p>
            <div style="display:flex; gap:0.5rem; justify-content:center; margin-bottom:1rem;">
                <button class="btn btn-primary" id="startMetroBtn"><i class="fas fa-play"></i> Iniciar</button>
                <button class="btn btn-ghost" id="stopMetroBtn"><i class="fas fa-stop"></i> Parar</button>
            </div>
            <div style="display:flex; flex-direction:column; gap:0.5rem;">
                <button class="btn btn-ghost" id="tapTempoBtn" style="background:#f1f5f9; color:#1e293b; justify-content:center;"><i class="fas fa-hand-pointer"></i> Pulsar Ritmo (Tap Tempo)</button>
                <button class="btn btn-primary" id="saveBpmBtn" style="display:none; justify-content:center; background:#10B981;"><i class="fas fa-save"></i> Guardar nuevo BPM permanentemente</button>
            </div>
            <hr style="margin:1rem 0; border:0; border-top:1px solid var(--border)">
            <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        </div>`);
        
        const led = document.getElementById('metroLed');
        const display = document.getElementById('metroBpmDisplay');
        const startBtn = document.getElementById('startMetroBtn');
        const stopBtn = document.getElementById('stopMetroBtn');
        const tapBtn = document.getElementById('tapTempoBtn');
        const saveBpmBtn = document.getElementById('saveBpmBtn');
        
        let isRunning = false;
        let tapTimes = [];
        
        const tick = () => { if(led) { led.classList.add('active'); setTimeout(() => led?.classList.remove('active'), 80); } };
        
        startBtn.onclick = () => {
            if (!isRunning) {
                isRunning = true; tick();
                metronomeInterval = setInterval(tick, 60000 / bpm);
            }
        };
        stopBtn.onclick = () => { if (metronomeInterval) clearInterval(metronomeInterval); isRunning = false; };
        
        tapBtn.onclick = () => {
            const now = Date.now();
            tapTimes.push(now);
            if (tapTimes.length > 4) tapTimes.shift();
            if (tapTimes.length > 1) {
                let intervals = [];
                for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
                let avg = intervals.reduce((a,b)=>a+b, 0) / intervals.length;
                let newBpm = Math.round(60000 / avg);
                if (newBpm >= 40 && newBpm <= 240) {
                    bpm = newBpm;
                    display.innerText = bpm;
                    if (song.bpm !== bpm) saveBpmBtn.style.display = "inline-flex";
                    if (isRunning) { clearInterval(metronomeInterval); metronomeInterval = setInterval(tick, 60000 / bpm); }
                }
            }
        };
        
        saveBpmBtn.onclick = async () => {
            song.bpm = bpm;
            const payload = buildPayload('canciones', song);
            await supabaseClient.from('canciones').update(payload).eq('id', song.id);
            saveBpmBtn.style.display = "none";
            alert("BPM actualizado en el servidor.");
            await loadUserData(); renderCurrentView();
        };
    }

    function dataURLtoBlob(dataURL) {
        const arr = dataURL.split(','); const mime = arr[0].match(/:(.*?);/)[1]; const bstr = atob(arr[1]); let n = bstr.length; const u8arr = new Uint8Array(n); while (n--) u8arr[n] = bstr.charCodeAt(n); return new Blob([u8arr], {type: mime});
    }

    // Escala cromática para el transporte de tonos
const chromaticScale = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

function transposeChord(chord, steps) {
    return chord.replace(/[A-G][#b]?/g, (match) => {
        // Normalizar bemoles a sostenidos si es necesario
        if (match === 'Db') match = 'C#';
        if (match === 'Eb') match = 'D#';
        if (match === 'Gb') match = 'F#';
        if (match === 'Ab') match = 'G#';
        if (match === 'Bb') match = 'A#';
        
        let index = chromaticScale.indexOf(match);
        if (index === -1) return match;
        
        let newIndex = (index + steps) % 12;
        if (newIndex < 0) newIndex += 12;
        
        return chromaticScale[newIndex];
    });
}

// Renderizador estilo Cifra Club: Toma texto con formato [C] [G] y lo separa en capas visuales
function renderCifraClubLayout(lyricsWithChords, steps = 0) {
    const lines = lyricsWithChords.split('\n');
    let finalHtml = '';

    lines.forEach(line => {
        // Si la línea contiene acordes estructurados en formato [Acorde]
        if (line.includes('[') && line.includes(']')) {
            let chordLine = '';
            let lyricLine = '';
            let currentIndex = 0;
            
            // Expresión regular para encontrar los acordes y sus posiciones
            const regex = /\[([^\]]+)\]/g;
            let match;
            
            let lastPlain室extIndex = 0;
            let segmentChordLine = '';
            
            // Analizar la línea caracter por caracter o mediante bloques
            // Para simplificar y mantener el rendimiento:
            let parsedLine = line.replace(/\[([^\]]+)\]/g, (m, chord) => {
                let transChord = transposeChord(chord, steps);
                return `<span class="chord-badge">${transChord}</span>`;
            });
            
            finalHtml += `<div class="cifra-line mixed">${parsedLine}</div>`;
        } else {
            // Línea de texto plano (sin acordes)
            finalHtml += `<div class="cifra-line text-only">${line || '&nbsp;'}</div>`;
        }
    });

    return finalHtml;
}
